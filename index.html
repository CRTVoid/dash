<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой уголок / Дашборд</title>
    <!-- Используем шрифт Inter для современного вида -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === ГЛОБАЛЬНЫЙ СБРОС И БАЗА === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0d0d0d;
            color: #e5e5e5;
            height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Главная сетка — как у командира на мостике */
        .dashboard {
            max-width: 1440px;
            width: 100%;
            height: 100%;
            max-height: 900px;
            display: grid;
            grid-template-columns: 1fr 2fr; /* 40% / 60% */
            grid-template-rows: 1fr 1fr;    /* Две строки */
            gap: 20px;
            background: #121212;
            padding: 24px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
        }

        /* === ОБЩИЙ СТИЛЬ ДЛЯ ВСЕХ ВИДЖЕТОВ === */
        .widget {
            background: #1c1c1c;
            border-radius: 28px;
            padding: 24px 24px 20px 24px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .widget:hover {
            border-color: rgba(255, 255, 255, 0.08);
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-shrink: 0;
            color: #a0a0a0;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .widget-header i {
            font-size: 1rem;
            color: #f97316; /* акцентный апельсин */
            width: 20px;
        }

        .widget-header span {
            opacity: 0.7;
        }

        /* ==========================================
                   ВИДЖЕТ 1: RSS (ЛЕВЫЙ, ВО ВСЮ ВЫСОТУ)
                ========================================== */
        .rss-widget {
            grid-row: 1 / 3; /* Занимает две строки */
            background: #181818;
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        .rss-feed {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Кастомный скролл */
        .rss-feed::-webkit-scrollbar {
            width: 4px;
        }
        .rss-feed::-webkit-scrollbar-track {
            background: transparent;
        }
        .rss-feed::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }

        .rss-item {
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid transparent;
            transition: all 0.15s ease;
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .rss-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-left-color: #f97316;
        }

        .rss-item .title {
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.4;
            color: #ececec;
            text-decoration: none;
        }

        .rss-item .title a {
            color: inherit;
            text-decoration: none;
        }

        .rss-item .title a:hover {
            color: #f97316;
        }

        .rss-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.7rem;
            color: #6b6b6b;
            letter-spacing: 0.02em;
        }

        .rss-meta .source {
            background: #2a2a2a;
            padding: 2px 10px;
            border-radius: 40px;
            color: #b0b0b0;
            font-weight: 600;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .rss-meta .date {
            opacity: 0.7;
        }

        /* ==========================================
                   ВИДЖЕТ 2: ПЛЕЕР / РАДИО (ВЕРХНИЙ ПРАВЫЙ)
                ========================================== */
        .player-widget {
            background: #1a1a1a;
            justify-content: space-between;
        }

        .player-content {
            display: flex;
            align-items: center;
            gap: 24px;
            flex: 1;
        }

        .vinyl {
            position: relative;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #333, #0f0f0f);
            border-radius: 50%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6), inset 0 -4px 8px rgba(0,0,0,0.5);
            flex-shrink: 0;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }

        .vinyl::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #f97316, #b24f0e);
            border-radius: 50%;
            border: 2px solid #222;
        }

        .vinyl.playing {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .radio-info {
            flex: 1;
        }

        .radio-info .track {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: #fff;
        }

        .radio-info .station {
            font-size: 0.8rem;
            color: #888;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-top: 8px;
        }

        .player-controls button {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 40px;
            transition: 0.2s;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-controls button:hover {
            background: #2c2c2c;
            color: #f97316;
        }

        .player-controls .play-btn {
            background: #f97316;
            color: #0d0d0d;
            width: 52px;
            height: 52px;
            font-size: 1.3rem;
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.25);
        }

        .player-controls .play-btn:hover {
            background: #ff8c38;
            transform: scale(1.02);
        }

        .station-select {
            background: #262626;
            border: none;
            color: #ddd;
            padding: 8px 16px 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            border: 1px solid #333;
        }

        .station-select option {
            background: #1c1c1c;
        }

        /* ==========================================
                   ВИДЖЕТ 3: ЗАМЕТКИ (НИЖНИЙ ПРАВЫЙ)
                ========================================== */
        .notes-widget {
            background: #181818;
        }

        .notes-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
            min-height: 0;
        }

        .notes-list::-webkit-scrollbar {
            width: 3px;
        }
        .notes-list::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }

        .note-item {
            background: #242424;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ddd;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            border: 1px solid transparent;
            transition: 0.15s;
        }

        .note-item:hover {
            border-color: #3a3a3a;
        }

        .note-item .note-text {
            word-break: break-word;
            flex: 1;
        }

        .note-item .delete-note {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
            opacity: 0;
            flex-shrink: 0;
        }

        .note-item:hover .delete-note {
            opacity: 1;
        }

        .note-item .delete-note:hover {
            color: #f87171;
            background: #2c1a1a;
        }

        .notes-input-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .notes-input-row input {
            flex: 1;
            background: #242424;
            border: 1px solid #333;
            border-radius: 40px;
            padding: 12px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: #eee;
            outline: none;
            transition: 0.2s;
        }

        .notes-input-row input:focus {
            border-color: #f97316;
            background: #2a2a2a;
        }

        .notes-input-row input::placeholder {
            color: #555;
        }

        .notes-input-row button {
            background: #f97316;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            font-weight: 600;
            color: #0d0d0d;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .notes-input-row button:hover {
            background: #ff8c38;
            transform: scale(0.97);
        }

        .notes-counter {
            font-size: 0.7rem;
            color: #555;
            margin-top: 6px;
            text-align: right;
            letter-spacing: 0.03em;
        }

        /* ==========================================
                   АДАПТИВНОСТЬ (ПЛАНШЕТЫ)
                ========================================== */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                max-height: none;
                height: auto;
                padding: 16px;
                gap: 16px;
                border-radius: 28px;
            }
            .rss-widget {
                grid-row: auto;
                max-height: 400px;
            }
            .player-widget {
                min-height: 200px;
            }
            .notes-widget {
                min-height: 280px;
            }
            .vinyl {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 500px) {
            body { padding: 10px; }
            .dashboard { padding: 12px; border-radius: 20px; }
            .widget { padding: 16px; }
            .player-content { flex-wrap: wrap; gap: 12px; }
        }
    </style>
</head>
<body>

<div class="dashboard">

    <!-- ========== ВИДЖЕТ 1: RSS ========== -->
    <div class="widget rss-widget">
        <div class="widget-header">
            <i class="fas fa-rss"></i>
            <span>Новостная лента</span>
            <span style="margin-left: auto; font-weight: 400; color: #555; text-transform: none; font-size: 0.7rem;">
                <i class="fas fa-circle" style="color: #22c55e; font-size: 0.4rem; vertical-align: middle;"></i> обновлено
            </span>
        </div>
        <div class="rss-feed" id="rssFeed">
            <!-- Сюда скрипт подгрузит новости -->
            <div style="text-align:center; padding: 40px 0; color: #444; font-size: 0.9rem;">
                <i class="fas fa-spinner fa-pulse" style="font-size: 1.4rem; color: #f97316;"></i><br><br>Загружаю ленту...
            </div>
        </div>
    </div>

    <!-- ========== ВИДЖЕТ 2: ПЛЕЕР / РАДИО ========== -->
    <div class="widget player-widget">
        <div class="widget-header">
            <i class="fas fa-headphones"></i>
            <span>Радио / Плеер</span>
            <select class="station-select" id="stationSelect">
                <option value="https://ice1.somafm.com/groovesalad-128-mp3" selected>🎧 Groove Salad (Chill)</option>
                <option value="https://ice1.somafm.com/lush-128-mp3">🌿 Lush (Ambient)</option>
                <option value="https://ice1.somafm.com/secretagent-128-mp3">🕵️ Secret Agent (Lounge)</option>
                <option value="https://ice1.somafm.com/defcon-128-mp3">💻 DEF CON (Dark Ambient)</option>
                <option value="https://stream.dancewave.online:8080/dance.mp3">⚡ Dance Wave</option>
            </select>
        </div>

        <div class="player-content">
            <div class="vinyl" id="vinylDisc"></div>
            <div class="radio-info">
                <div class="track" id="trackName">Groove Salad</div>
                <div class="station" id="stationName">SomaFM · Чиллаут</div>
                <div class="player-controls">
                    <button id="playBtn" class="play-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="stopBtn">
                        <i class="fas fa-stop"></i>
                    </button>
                    <div style="display: flex; align-items: center; gap: 10px; margin-left: 4px;">
                        <i class="fas fa-volume-low" style="color: #666; font-size: 0.8rem;"></i>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7" 
                               style="width: 80px; background: #333; height: 3px; border-radius: 10px; accent-color: #f97316;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== ВИДЖЕТ 3: ЗАМЕТКИ ========== -->
    <div class="widget notes-widget">
        <div class="widget-header">
            <i class="fas fa-pencil-alt"></i>
            <span>Быстрые заметки</span>
            <span style="margin-left: auto; font-weight: 400; color: #555; text-transform: none; font-size: 0.7rem;">
                <i class="far fa-save"></i> автосохранение
            </span>
        </div>
        <div class="notes-area">
            <div class="notes-list" id="notesList">
                <!-- Список заметок отрисует JS -->
            </div>
            <div class="notes-input-row">
                <input type="text" id="noteInput" placeholder="Напишите мысль и нажмите Enter..." maxlength="200">
                <button id="addNoteBtn"><i class="fas fa-plus"></i> Добавить</button>
            </div>
            <div class="notes-counter" id="notesCounter">0 заметок</div>
        </div>
    </div>
</div>

<!-- ========================================================== -->
<!-- ======================== JAVASCRIPT ======================= -->
<!-- ========================================================== -->
<script>
    (function() {
        'use strict';

        // --- 1. RSS ПАРСЕР (через AllOrigins, бесплатно и без CORS) ---
        const RSS_FEEDS = [
            { name: 'Meduza', url: 'https://meduza.io/rss/all' },
            { name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
            { name: 'BBC Рус', url: 'http://feeds.bbci.co.uk/russian/news/rss.xml' },
        ];

        const rssFeedContainer = document.getElementById('rssFeed');

        async function fetchRSS() {
            try {
                let allItems = [];

                for (const feed of RSS_FEEDS) {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(feed.url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) continue;
                    const xmlText = await response.text();
                    
                    // Парсим XML
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                    const items = xmlDoc.querySelectorAll('item');
                    
                    items.forEach(item => {
                        const title = item.querySelector('title')?.textContent?.trim() || 'Без заголовка';
                        const link = item.querySelector('link')?.textContent?.trim() || '#';
                        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
                        allItems.push({
                            title: title,
                            link: link,
                            source: feed.name,
                            date: pubDate,
                        });
                    });
                }

                // Сортируем по дате (свежие сверху) — если дата есть
                allItems.sort((a, b) => {
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    if (isNaN(dateA) || isNaN(dateB)) return 0;
                    return dateB - dateA;
                });

                // Ограничим 30 записями, чтобы не захламлять
                allItems = allItems.slice(0, 30);

                renderRSS(allItems);
            } catch (error) {
                console.warn('RSS load error:', error);
                rssFeedContainer.innerHTML = `
                    <div style="padding: 30px 0; text-align:center; color: #666; font-size:0.9rem;">
                        <i class="fas fa-exclamation-triangle" style="color: #f97316;"></i><br><br>
                        Не удалось загрузить ленту.<br>
                        <span style="font-size:0.8rem; color:#444;">(возможно, превышен лимит запросов)</span>
                    </div>
                `;
            }
        }

        function renderRSS(items) {
            if (!items.length) {
                rssFeedContainer.innerHTML = `<div style="padding: 30px 0; text-align:center; color: #555;">Нет новостей</div>`;
                return;
            }

            let html = '';
            items.forEach(item => {
                const title = item.title.length > 120 ? item.title.slice(0, 120) + '…' : item.title;
                const dateStr = item.date ? new Date(item.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'}) : '';
                html += `
                    <div class="rss-item">
                        <div class="title"><a href="${item.link}" target="_blank" rel="noopener">${title}</a></div>
                        <div class="rss-meta">
                            <span class="source">${item.source}</span>
                            ${dateStr ? `<span class="date">${dateStr}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            rssFeedContainer.innerHTML = html;
        }

        // Загружаем RSS при старте
        fetchRSS();
        // Обновляем раз в 10 минут (600 000 мс)
        setInterval(fetchRSS, 600000);

        // --- 2. РАДИО / ПЛЕЕР ---
        const audio = new Audio();
        audio.volume = 0.7;

        const vinyl = document.getElementById('vinylDisc');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const stationSelect = document.getElementById('stationSelect');
        const trackName = document.getElementById('trackName');
        const stationName = document.getElementById('stationName');
        const volumeSlider = document.getElementById('volumeSlider');

        // Маппинг для красивого отображения
        const stationNames = {
            'https://ice1.somafm.com/groovesalad-128-mp3': { track: 'Groove Salad', station: 'SomaFM · Чиллаут' },
            'https://ice1.somafm.com/lush-128-mp3': { track: 'Lush', station: 'SomaFM · Эмбиент' },
            'https://ice1.somafm.com/secretagent-128-mp3': { track: 'Secret Agent', station: 'SomaFM · Лаунж' },
            'https://ice1.somafm.com/defcon-128-mp3': { track: 'DEF CON', station: 'SomaFM · Dark Ambient' },
            'https://stream.dancewave.online:8080/dance.mp3': { track: 'Dance Wave', station: 'Танцевальное радио' },
        };

        function updateStationInfo(url) {
            const info = stationNames[url];
            if (info) {
                trackName.textContent = info.track;
                stationName.textContent = info.station;
            } else {
                trackName.textContent = 'Радио';
                stationName.textContent = 'Поток';
            }
        }

        function playRadio() {
            const url = stationSelect.value;
            if (audio.src !== url) {
                audio.src = url;
                audio.load();
            }
            audio.play().catch(e => console.warn('Play error:', e));
            vinyl.classList.add('playing');
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            updateStationInfo(url);
        }

        function pauseRadio() {
            audio.pause();
            vinyl.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }

        function stopRadio() {
            audio.pause();
            audio.currentTime = 0;
            audio.src = '';
            vinyl.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            trackName.textContent = 'Станция не выбрана';
            stationName.textContent = 'Нажмите Play';
        }

        // События
        playBtn.addEventListener('click', () => {
            if (audio.src && !audio.paused) {
                pauseRadio();
            } else {
                playRadio();
            }
        });

        stopBtn.addEventListener('click', stopRadio);

        stationSelect.addEventListener('change', () => {
            if (audio.src && !audio.paused) {
                // Если играет — переключаем и продолжаем играть
                playRadio();
            } else {
                updateStationInfo(stationSelect.value);
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        // При загрузке страницы поставим инфу о первой станции
        updateStationInfo(stationSelect.value);

        // --- 3. ЗАМЕТКИ (localStorage) ---
        const notesList = document.getElementById('notesList');
        const noteInput = document.getElementById('noteInput');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const notesCounter = document.getElementById('notesCounter');

        let notes = [];

        function loadNotes() {
            try {
                const stored = localStorage.getItem('dashboard_notes');
                if (stored) {
                    notes = JSON.parse(stored);
                } else {
                    notes = [];
                }
            } catch (e) {
                notes = [];
            }
            renderNotes();
        }

        function saveNotes() {
            localStorage.setItem('dashboard_notes', JSON.stringify(notes));
            renderNotes();
        }

        function renderNotes() {
            if (notes.length === 0) {
                notesList.innerHTML = `
                    <div style="text-align:center; padding: 28px 0; color: #444; font-size:0.85rem;">
                        <i class="far fa-sticky-note" style="font-size:1.6rem; display:block; margin-bottom:8px; color:#333;"></i>
                        Здесь будут ваши мысли
                    </div>
                `;
            } else {
                let html = '';
                notes.forEach((note, index) => {
                    const text = note.length > 180 ? note.slice(0, 180) + '…' : note;
                    html += `
                        <div class="note-item">
                            <span class="note-text">${text}</span>
                            <button class="delete-note" data-index="${index}"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                });
                notesList.innerHTML = html;

                // Вешаем удаление
                document.querySelectorAll('.delete-note').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const idx = parseInt(this.dataset.index, 10);
                        notes.splice(idx, 1);
                        saveNotes();
                    });
                });
            }
            notesCounter.textContent = `${notes.length} ${declension(notes.length, 'заметка', 'заметки', 'заметок')}`;
        }

        function declension(n, one, two, five) {
            if (n % 10 === 1 && n % 100 !== 11) return one;
            if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return two;
            return five;
        }

        function addNote() {
            const text = noteInput.value.trim();
            if (text === '') return;
            notes.unshift(text);
            noteInput.value = '';
            saveNotes();
            noteInput.focus();
        }

        noteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addNote();
            }
        });

        addNoteBtn.addEventListener('click', addNote);

        // Инициализация заметок
        loadNotes();

        // Автосохранение при потере фокуса (на всякий случай)
        window.addEventListener('beforeunload', function() {
            saveNotes();
        });

    })();
</script>

</body>
</html>
