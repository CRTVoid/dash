<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой уголок / Дашборд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.4s ease, color 0.4s ease;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        /* === ЦВЕТОВЫЕ СХЕМЫ === */
        .theme-dark {
            --bg-primary: #0d0d0d;
            --bg-secondary: #121212;
            --bg-widget: #1c1c1c;
            --bg-widget-alt: #181818;
            --bg-input: #242424;
            --bg-hover: rgba(255,255,255,0.04);
            --text-primary: #e5e5e5;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border-color: rgba(255,255,255,0.04);
            --border-hover: rgba(255,255,255,0.08);
            --accent: #f97316;
            --accent-hover: #ff8c38;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-light {
            --bg-primary: #f0f0f0;
            --bg-secondary: #ffffff;
            --bg-widget: #f8f8f8;
            --bg-widget-alt: #f0f0f0;
            --bg-input: #e8e8e8;
            --bg-hover: rgba(0,0,0,0.04);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border-color: rgba(0,0,0,0.06);
            --border-hover: rgba(0,0,0,0.12);
            --accent: #e8600c;
            --accent-hover: #f97316;
            --shadow: rgba(0,0,0,0.15);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-ocean {
            --bg-primary: #0a1628;
            --bg-secondary: #0f2040;
            --bg-widget: #152b4a;
            --bg-widget-alt: #122240;
            --bg-input: #1a3355;
            --bg-hover: rgba(100,180,255,0.06);
            --text-primary: #d0e4ff;
            --text-secondary: #8ab4f8;
            --text-muted: #5a7a9a;
            --border-color: rgba(100,180,255,0.08);
            --border-hover: rgba(100,180,255,0.15);
            --accent: #4fc3ff;
            --accent-hover: #7ad0ff;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-forest {
            --bg-primary: #0a1a0a;
            --bg-secondary: #0f240f;
            --bg-widget: #163016;
            --bg-widget-alt: #122812;
            --bg-input: #1a3a1a;
            --bg-hover: rgba(100,200,100,0.06);
            --text-primary: #d4e8d4;
            --text-secondary: #7ab87a;
            --text-muted: #4a7a4a;
            --border-color: rgba(100,200,100,0.08);
            --border-hover: rgba(100,200,100,0.15);
            --accent: #66d966;
            --accent-hover: #88e888;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-sunset {
            --bg-primary: #1a0a0a;
            --bg-secondary: #2a1010;
            --bg-widget: #3a1818;
            --bg-widget-alt: #301414;
            --bg-input: #4a2020;
            --bg-hover: rgba(255,150,100,0.06);
            --text-primary: #f5d0c0;
            --text-secondary: #e89070;
            --text-muted: #9a6a5a;
            --border-color: rgba(255,150,100,0.08);
            --border-hover: rgba(255,150,100,0.15);
            --accent: #ff7f50;
            --accent-hover: #ff9a70;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-midnight {
            --bg-primary: #0a0a1a;
            --bg-secondary: #10102a;
            --bg-widget: #18183a;
            --bg-widget-alt: #141430;
            --bg-input: #20204a;
            --bg-hover: rgba(150,100,255,0.06);
            --text-primary: #d0d0f0;
            --text-secondary: #9090d0;
            --text-muted: #5a5a8a;
            --border-color: rgba(150,100,255,0.08);
            --border-hover: rgba(150,100,255,0.15);
            --accent: #a78bfa;
            --accent-hover: #c4b5fd;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-cyber {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f1a;
            --bg-widget: #1a1a2e;
            --bg-widget-alt: #14142a;
            --bg-input: #22223a;
            --bg-hover: rgba(0,255,255,0.06);
            --text-primary: #b0f0f0;
            --text-secondary: #70d0d0;
            --text-muted: #4a7a7a;
            --border-color: rgba(0,255,255,0.08);
            --border-hover: rgba(0,255,255,0.15);
            --accent: #00ffff;
            --accent-hover: #66ffff;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-rose {
            --bg-primary: #1a0a14;
            --bg-secondary: #2a0f1e;
            --bg-widget: #3a1528;
            --bg-widget-alt: #301222;
            --bg-input: #4a1a32;
            --bg-hover: rgba(255,100,150,0.06);
            --text-primary: #f0d0e0;
            --text-secondary: #d080b0;
            --text-muted: #8a5a7a;
            --border-color: rgba(255,100,150,0.08);
            --border-hover: rgba(255,100,150,0.15);
            --accent: #f472b6;
            --accent-hover: #f9a8d4;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-coffee {
            --bg-primary: #14100a;
            --bg-secondary: #1e1812;
            --bg-widget: #2a221a;
            --bg-widget-alt: #241e16;
            --bg-input: #362c22;
            --bg-hover: rgba(200,170,130,0.06);
            --text-primary: #e8ddd0;
            --text-secondary: #b0a090;
            --text-muted: #7a6a5a;
            --border-color: rgba(200,170,130,0.08);
            --border-hover: rgba(200,170,130,0.15);
            --accent: #d4a373;
            --accent-hover: #e0b88a;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-aurora {
            --bg-primary: #0a0a14;
            --bg-secondary: #0a1420;
            --bg-widget: #0f2030;
            --bg-widget-alt: #0a1a2a;
            --bg-input: #142a3a;
            --bg-hover: rgba(50,200,180,0.06);
            --text-primary: #d0f0e8;
            --text-secondary: #80d0c0;
            --text-muted: #4a8a7a;
            --border-color: rgba(50,200,180,0.08);
            --border-hover: rgba(50,200,180,0.15);
            --accent: #5eead4;
            --accent-hover: #8ff0e0;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-lavender {
            --bg-primary: #140a1a;
            --bg-secondary: #1e1028;
            --bg-widget: #2a1838;
            --bg-widget-alt: #241430;
            --bg-input: #36204a;
            --bg-hover: rgba(180,100,255,0.06);
            --text-primary: #e8d8f0;
            --text-secondary: #b090d0;
            --text-muted: #7a5a8a;
            --border-color: rgba(180,100,255,0.08);
            --border-hover: rgba(180,100,255,0.15);
            --accent: #c084fc;
            --accent-hover: #d8a8fc;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-matrix {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0a100a;
            --bg-widget: #0f1a0f;
            --bg-widget-alt: #0a160a;
            --bg-input: #142014;
            --bg-hover: rgba(0,200,0,0.06);
            --text-primary: #b0e8b0;
            --text-secondary: #60b060;
            --text-muted: #3a6a3a;
            --border-color: rgba(0,200,0,0.08);
            --border-hover: rgba(0,200,0,0.15);
            --accent: #00cc00;
            --accent-hover: #33ff33;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }

        .dashboard {
            max-width: 1440px;
            width: 100%;
            height: 100%;
            max-height: 900px;
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: auto 1fr;
            gap: 12px;
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 32px;
            box-shadow: 0 25px 60px var(--shadow);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .widget {
            background: var(--bg-widget);
            border-radius: 24px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            transition: background 0.4s ease, border-color 0.2s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .widget:hover {
            border-color: var(--border-hover);
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.65rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .widget-header i {
            font-size: 0.8rem;
            color: var(--accent);
            width: 16px;
            transition: color 0.4s ease;
        }

        .widget-header .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
            color: var(--text-muted);
            text-transform: none;
            font-size: 0.6rem;
        }

        /* === ЛЕВАЯ КОЛОНКА: RSS === */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s ease;
            max-width: 280px;
            min-width: 180px;
            flex: 0 0 auto;
            overflow: hidden;
        }

        .left-column.collapsed {
            max-width: 0;
            min-width: 0;
            flex: 0 0 0;
            padding: 0;
            gap: 0;
            margin: 0;
            border: 0;
        }

        .left-column .widget {
            flex: 1;
            min-height: 0;
        }

        .left-column .rss-widget {
            flex: 1;
            background: var(--bg-widget-alt);
            min-height: 200px;
        }

        .rss-feed {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .rss-feed::-webkit-scrollbar {
            width: 3px;
        }
        .rss-feed::-webkit-scrollbar-track {
            background: transparent;
        }
        .rss-feed::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
            opacity: 0.3;
        }

        .rss-item {
            padding: 6px 10px;
            border-radius: 10px;
            background: var(--bg-hover);
            border-left: 2px solid transparent;
            transition: all 0.15s ease;
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .rss-item:hover {
            background: var(--bg-hover);
            border-left-color: var(--accent);
        }

        .rss-item .title {
            font-weight: 500;
            font-size: 0.8rem;
            line-height: 1.3;
            color: var(--text-primary);
            text-decoration: none;
        }

        .rss-item .title a {
            color: inherit;
            text-decoration: none;
        }

        .rss-item .title a:hover {
            color: var(--accent);
        }

        .rss-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .rss-meta .source {
            background: var(--bg-widget);
            padding: 1px 6px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.45rem;
            text-transform: uppercase;
        }

        .refresh-btn,
        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 0.65rem;
            transition: 0.2s;
        }

        .refresh-btn:hover,
        .toggle-btn:hover {
            color: var(--accent);
        }

        .toggle-btn.collapsed i {
            transform: rotate(180deg);
        }

        /* === ПРАВАЯ ЧАСТЬ === */
        .right-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }

        /* === ВЕРХНЯЯ ПРАВАЯ: Плеер + Часы === */
        .top-right {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-shrink: 0;
        }

        .top-right .widget {
            padding: 12px 16px;
        }

        /* Плеер */
        .player-widget {
            background: var(--bg-widget);
        }

        .player-content {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .vinyl-container {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: 50%;
        }

        .vinyl-container svg {
            width: 100%;
            height: 100%;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        .vinyl-container.playing svg {
            animation-play-state: running;
        }

        .vinyl-container.playing .vinyl-shadow {
            animation: pulseShadow 2s ease-in-out infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseShadow {
            0%,
            100% {
                opacity: 0.15;
                transform: scale(1);
            }
            50% {
                opacity: 0.35;
                transform: scale(1.05);
            }
        }

        .vinyl-shadow {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 70%);
            opacity: 0;
            filter: blur(15px);
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 0;
        }

        .vinyl-container.playing .vinyl-shadow {
            opacity: 0.25;
        }

        .radio-info {
            flex: 1;
            min-width: 0;
        }

        .radio-info .track {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 1px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .radio-info .station {
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .player-controls button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 3px;
            border-radius: 30px;
            transition: 0.2s;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-controls button:hover {
            background: var(--bg-input);
            color: var(--accent);
        }

        .player-controls .play-btn {
            background: var(--accent);
            color: var(--bg-primary);
            width: 38px;
            height: 38px;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .player-controls .play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .player-controls input[type="range"] {
            width: 40px;
            background: var(--bg-input);
            height: 2px;
            border-radius: 10px;
            accent-color: var(--accent);
        }

        /* === Часы === */
        .clock-widget {
            background: var(--bg-widget);
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
        }

        .clock-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .clock-time {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.4s ease;
            line-height: 1.1;
        }

        .clock-date {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 1px;
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        /* === НИЖНЯЯ ПРАВАЯ: Мульти-виджет === */
        .bottom-right {
            flex: 1;
            min-height: 0;
            display: flex;
            gap: 12px;
        }

        .bottom-right .widget {
            flex: 1;
            min-height: 200px;
        }

        .bottom-right .widget .widget-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* === РИСОВАНИЕ === */
        .draw-area {
            flex: 1;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            cursor: crosshair;
            touch-action: none;
            min-height: 150px;
        }

        .draw-area canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .draw-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .draw-controls button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.55rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
            height: 24px;
        }

        .draw-controls button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .draw-controls button.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .draw-colors {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            max-width: 200px;
        }

        .draw-colors .color-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .draw-colors .color-dot:hover {
            transform: scale(1.15);
        }

        .draw-colors .color-dot.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }

        .draw-controls .size-control {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .draw-controls .size-control input {
            width: 40px;
            accent-color: var(--accent);
            background: var(--bg-input);
            height: 2px;
        }

        .draw-controls .size-control span {
            font-size: 0.5rem;
            color: var(--text-muted);
            min-width: 14px;
        }

        /* === ТЕКСТОВЫЙ РЕДАКТОР === */
        .text-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .text-editor textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 14px;
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            color: var(--text-primary);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            min-height: 100px;
            line-height: 1.6;
        }

        .text-editor textarea:focus {
            border-color: var(--accent);
        }

        .text-editor textarea::placeholder {
            color: var(--text-muted);
        }

        .text-editor .editor-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .text-editor .editor-controls button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 0.55rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            height: 24px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .text-editor .editor-controls button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .text-editor .editor-stats {
            font-size: 0.5rem;
            color: var(--text-muted);
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* === ПЕРЕКЛЮЧАТЕЛЬ ВИДЖЕТОВ === */
        .widget-switcher {
            display: flex;
            gap: 3px;
            margin-left: 4px;
        }

        .widget-switcher .switcher-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .widget-switcher .switcher-btn:hover {
            color: var(--text-secondary);
            background: var(--bg-hover);
        }

        .widget-switcher .switcher-btn.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(249, 115, 22, 0.08);
        }

        .widget-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .widget-content.hidden {
            display: none;
        }

        /* === ДРОПДАУНЫ (поверх всего) === */
        .dropdown-wrapper {
            position: relative;
            z-index: 9999;
        }

        .station-dropdown-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 3px 10px 3px 10px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.4s ease, color 0.4s ease;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-dropdown-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }

        .station-dropdown-btn i {
            font-size: 0.5rem;
            color: var(--text-muted);
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .station-dropdown-btn.open i {
            transform: rotate(180deg);
        }

        .station-dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: var(--bg-widget);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 4px 0;
            min-width: 170px;
            max-height: 220px;
            overflow-y: auto;
            box-shadow: 0 12px 40px var(--shadow);
            display: none;
            backdrop-filter: blur(8px);
        }

        .station-dropdown-menu.open {
            display: block;
        }

        .station-dropdown-menu::-webkit-scrollbar {
            width: 3px;
        }
        .station-dropdown-menu::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .station-dropdown-item {
            padding: 6px 14px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 2px solid transparent;
        }

        .station-dropdown-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-left-color: var(--accent);
        }

        .station-dropdown-item.active {
            color: var(--accent);
            font-weight: 600;
            border-left-color: var(--accent);
        }

        .station-dropdown-item .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
        }

        .station-dropdown-item.active .dot {
            background: var(--accent);
        }

        /* === ТЕМЫ === */
        .theme-picker-wrapper {
            position: relative;
            z-index: 9999;
        }

        .theme-picker-trigger {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .theme-picker-trigger:hover {
            transform: scale(1.1);
            border-color: var(--border-hover);
        }

        .theme-picker-popup {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            background: var(--bg-widget);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px 10px;
            box-shadow: 0 12px 40px var(--shadow);
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            max-width: 160px;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .theme-picker-popup.open {
            display: flex;
        }

        .theme-picker-popup .theme-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .theme-picker-popup .theme-dot:hover {
            transform: scale(1.15);
        }

        .theme-picker-popup .theme-dot.active {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.25);
        }

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 1024px) {
            .dashboard {
                gap: 10px;
                padding: 12px;
                max-height: none;
                height: auto;
            }
            .left-column {
                max-width: 220px;
                min-width: 140px;
            }
            .clock-time {
                font-size: 2.2rem;
            }
            .vinyl-container {
                width: 65px;
                height: 65px;
            }
            .bottom-right {
                flex-direction: column;
            }
        }

        @media (max-width: 820px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                gap: 10px;
                padding: 10px;
                border-radius: 24px;
                max-height: none;
                height: auto;
            }
            .left-column {
                max-width: none;
                min-width: 0;
                flex: 0 0 auto;
                max-height: 200px;
            }
            .left-column.collapsed {
                max-height: 0;
                min-height: 0;
                flex: 0 0 0;
                overflow: hidden;
                margin: 0;
                padding: 0;
                gap: 0;
            }
            .top-right {
                grid-template-columns: 1fr 1fr;
            }
            .bottom-right {
                flex-direction: column;
            }
            .bottom-right .widget {
                min-height: 180px;
            }
            .clock-time {
                font-size: 2rem;
            }
            .vinyl-container {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 500px) {
            body {
                padding: 8px;
            }
            .dashboard {
                padding: 8px;
                gap: 8px;
                border-radius: 16px;
            }
            .widget {
                padding: 10px 12px;
                border-radius: 16px;
            }
            .top-right {
                grid-template-columns: 1fr;
            }
            .clock-time {
                font-size: 1.8rem;
            }
            .vinyl-container {
                width: 55px;
                height: 55px;
            }
            .bottom-right .widget {
                min-height: 150px;
            }
            .station-dropdown-btn {
                max-width: 80px;
                font-size: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">

        <!-- === ЛЕВАЯ КОЛОНКА: RSS === -->
        <div class="left-column" id="leftColumn">
            <div class="widget rss-widget">

        </div>

        <!-- === ПРАВАЯ ЧАСТЬ === -->
        <div class="right-area">

            <!-- === ВЕРХНЯЯ ПРАВАЯ: Плеер + Часы === -->
            <div class="top-right">
                <!-- Плеер -->
                <div class="widget player-widget">
                    <div class="widget-header">
                        <i class="fas fa-headphones"></i>
                        <span>Радио</span>
                        <div class="header-right">
                            <div class="dropdown-wrapper">
                                <button class="station-dropdown-btn" id="stationDropdownBtn">
                                    <span id="currentStationLabel">Groove Salad</span>
                                    <i class="fas fa-chevron-down"></i>
                                </button>
                                <div class="station-dropdown-menu" id="stationDropdownMenu"></div>
                            </div>
                            <div class="theme-picker-wrapper">
                                <div class="theme-picker-trigger" id="themePickerTrigger" title="Выбрать тему"></div>
                                <div class="theme-picker-popup" id="themePickerPopup"></div>
                            </div>
                        </div>
                    </div>

                    <div class="player-content">
                        <div class="vinyl-container" id="vinylContainer">
                            <div class="vinyl-shadow"></div>
                            <svg viewBox="0 0 120 120">
                                <defs>
                                    <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">

                                        <stop offset="45%" stop-color="var(--vinyl-light)"/>

                                        <stop offset="75%" stop-color="var(--vinyl-light)"/>
                                        <stop offset="90%" stop-color="var(--vinyl-dark)"/>
                                        <stop offset="100%" stop-color="var(--vinyl-light)"/>
                                    </radialGradient>
                                    <radialGradient id="shine1" cx="65%" cy="30%" r="35%">
                                        <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>

                                        <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>

                                        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>

                                        <stop offset="0%" stop-color="var(--accent)"/>
                                        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.7"/>

                                </defs>
                                <circle cx="60" cy="60" r="56" fill="url(#vinylGrad)" stroke="var(--border-color)" stroke-width="0.5"/>
                                <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                                <circle cx="60" cy="60" r="49" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                                <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                                <circle cx="60" cy="60" r="43" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                                <circle cx="60" cy="60" r="40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                                <circle cx="60" cy="60" r="37" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                                <circle cx="60" cy="60" r="34" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                                <circle cx="60" cy="60" r="31" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                                <circle cx="60" cy="60" r="28" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                                <circle cx="60" cy="60" r="25" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>
                                <circle cx="60" cy="60" r="22" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                                <circle cx="60" cy="60" r="56" fill="url(#shine1)"/>
                                <circle cx="60" cy="60" r="56" fill="url(#shine2)"/>
                                <circle cx="60" cy="60" r="18" fill="url(#labelGrad)" opacity="0.9"/>
                                <circle cx="60" cy="60" r="14" fill="var(--bg-secondary)" opacity="0.12"/>
                                <circle cx="60" cy="60" r="8" fill="var(--bg-secondary)" stroke="var(--border-color)" stroke-width="0.5"/>
                                <circle cx="60" cy="60" r="4" fill="var(--bg-primary)"/>
                                <circle cx="60" cy="60" r="2" fill="var(--accent)" opacity="0.3"/>
                                <text x="60" y="53" font-size="5" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="700" letter-spacing="0.5">S</text>
                                <text x="60" y="63" font-size="3.5" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="300">FM</text>
                            </svg>
                        </div>
                        <div class="radio-info">

                            <div class="station" id="stationName">SomaFM · Chillout</div>
                            <div class="player-controls">
                                <button id="prevBtn"><i class="fas fa-step-backward"></i></button>

                <!-- Часы -->
                <div class="widget clock-widget">

                    <!-- Текстовый редактор -->
                    <div class="widget-content hidden" id="textContent">

                            <div class="editor-controls">
                                <button id="textSave"><i class="fas fa-save"></i> Сохранить</button>

    <script>
        (function() {
            'use strict';

            // === СПИСОК РАДИОСТАНЦИЙ ===
            const stations = [
                { value: 'https://ice1.somafm.com/groovesalad-128-mp3', track: 'Groove Salad', station: 'SomaFM · Chillout' },
                { value: 'https://ice1.somafm.com/darkzone-128-mp3', track: 'The Dark Zone', station: 'SomaFM · Ambient' },
                { value: 'https://ice1.somafm.com/defcon-128-mp3', track: 'Def Con Radio', station: 'SomaFM · Dark Ambient' },
                { value: 'https://ice1.somafm.com/metal-128-mp3', track: 'Metal Detector', station: 'SomaFM · Heavy Metal' },
                { value: 'https://ice1.somafm.com/lc70s-128-mp3', track: 'Left Coast 70s', station: 'SomaFM · 70s Hits' },
                { value: 'https://ice1.somafm.com/u80s-128-mp3', track: 'Underground 80s', station: 'SomaFM · 80s Underground' },
                { value: 'https://ice1.somafm.com/7soul-128-mp3', track: 'Seven Inch Soul', station: 'SomaFM · Soul Classics' },
                { value: 'https://ice1.somafm.com/insound-128-mp3', track: 'The In-Sound', station: 'SomaFM · 60s Garage' },
                { value: 'https://ice1.somafm.com/covers-128-mp3', track: 'Covers', station: 'SomaFM · Cover Versions' },
                { value: 'https://ice1.somafm.com/sf1033-128-mp3', track: 'SF 10-33', station: 'SomaFM · Police Radio' },
                { value: 'https://ice1.somafm.com/scanner-128-mp3', track: 'SF Police Scanner', station: 'SomaFM · Live Scanner' },
                { value: 'https://ice1.somafm.com/sfinsf-128-mp3', track: 'SF in SF', station: 'SomaFM · Live in SF' },
                { value: 'https://ice1.somafm.com/vaporwaves-128-mp3', track: 'Vaporvawes', station: 'SomaFM · Vaporwave' },
                { value: 'https://ice1.somafm.com/doomed-128-mp3', track: 'Doomed', station: 'SomaFM · Doom Metal' },
                { value: 'https://ice1.somafm.com/beatblender-128-mp3', track: 'Beat Blender', station: 'SomaFM · Deep House' },
            ];

            let currentStationIndex = 0;

            // === КАСТОМНЫЙ ДРОПДАУН СТАНЦИЙ ===
            const dropdownBtn = document.getElementById('stationDropdownBtn');
            const dropdownMenu = document.getElementById('stationDropdownMenu');
            const currentStationLabel = document.getElementById('currentStationLabel');

            function renderStationDropdown() {
                let html = '';
                stations.forEach((s, i) => {
                    html += `
                            <div class="station-dropdown-item ${i === currentStationIndex ? 'active' : ''}" data-index="${i}">
                                <span class="dot"></span>
                                ${s.track}
                            </div>
                        `;
                });
                dropdownMenu.innerHTML = html;

                dropdownMenu.querySelectorAll('.station-dropdown-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(item.dataset.index, 10);
                        selectStation(idx);
                        dropdownMenu.classList.remove('open');
                        dropdownBtn.classList.remove('open');
                    });
                });
            }

            function selectStation(index) {
                currentStationIndex = index;
                const s = stations[index];
                currentStationLabel.textContent = s.track;
                updateStationInfo(index);
                if (audio.src && !audio.paused) {
                    playRadio(index);
                }
                renderStationDropdown();
            }

            dropdownBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdownMenu.classList.toggle('open');
                dropdownBtn.classList.toggle('open');
            });

            document.addEventListener('click', () => {
                dropdownMenu.classList.remove('open');
                dropdownBtn.classList.remove('open');
            });

            // === ТЕМЫ ===
            const themes = [
                { id: 'theme-dark', color: '#1a1a1a' },
                { id: 'theme-light', color: '#e8e8e8' },
                { id: 'theme-ocean', color: '#1a3a6a' },
                { id: 'theme-forest', color: '#1a3a1a' },
                { id: 'theme-sunset', color: '#6a2a1a' },
                { id: 'theme-midnight', color: '#2a1a4a' },
                { id: 'theme-cyber', color: '#1a3a3a' },
                { id: 'theme-rose', color: '#4a1a2a' },
                { id: 'theme-coffee', color: '#3a2a1a' },
                { id: 'theme-aurora', color: '#1a3a4a' },
                { id: 'theme-lavender', color: '#3a1a4a' },
                { id: 'theme-matrix', color: '#1a3a1a' },
            ];

            const themeTrigger = document.getElementById('themePickerTrigger');
            const themePopup = document.getElementById('themePickerPopup');
            const body = document.body;

            function renderThemePicker() {
                let html = '';
                themes.forEach(t => {
                    const isActive = body.className === t.id;
                    html += `
                            <div class="theme-dot ${isActive ? 'active' : ''}" 
                                 style="background:${t.color};" 
                                 data-theme="${t.id}"
                                 title="${t.id.replace('theme-', '')}">
                            </div>
                        `;
                });
                themePopup.innerHTML = html;

                const activeTheme = themes.find(t => t.id === body.className);
                if (activeTheme) {
                    themeTrigger.style.background = activeTheme.color;
                }

                themePopup.querySelectorAll('.theme-dot').forEach(dot => {
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        setTheme(dot.dataset.theme);
                        themePopup.classList.remove('open');
                    });
                });
            }

            function setTheme(themeName) {
                body.className = themeName;
                localStorage.setItem('dashboard_theme', themeName);
                renderThemePicker();
            }

            themeTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                themePopup.classList.toggle('open');
            });

            document.addEventListener('click', () => {
                themePopup.classList.remove('open');
            });

            const savedTheme = localStorage.getItem('dashboard_theme');
            if (savedTheme && themes.some(t => t.id === savedTheme)) {
                setTheme(savedTheme);
            } else {
                setTheme('theme-dark');
            }

            // === ЧАСЫ ===
            function updateClock() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('clockTime').textContent = `${hours}:${minutes}:${seconds}`;
                const options = { day: 'numeric', month: 'long', year: 'numeric' };
                document.getElementById('clockDate').textContent = now.toLocaleDateString('ru-RU', options);
            }
            updateClock();
            setInterval(updateClock, 1000);

            // === RSS ===
            const RSS_FEEDS = [
                { name: 'Meduza', url: 'https://meduza.io/rss/all' },
                { name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
                { name: 'BBC Russian', url: 'http://feeds.bbci.co.uk/russian/news/rss.xml' },
            ];

            const rssFeedContainer = document.getElementById('rssFeed');

            async function fetchRSS() {
                try {
                    let allItems = [];

                    for (const feed of RSS_FEEDS) {
                        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(feed.url)}`;
                        const response = await fetch(proxyUrl);
                        if (!response.ok) continue;
                        const xmlText = await response.text();

                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                        const items = xmlDoc.querySelectorAll('item');

                        items.forEach(item => {
                            const title = item.querySelector('title')?.textContent?.trim() || 'Без заголовка';
                            const link = item.querySelector('link')?.textContent?.trim() || '#';
                            const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
                            allItems.push({
                                title: title,
                                link: link,
                                source: feed.name,
                                date: pubDate,
                            });
                        });
                    }

                    allItems.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        if (isNaN(dateA) || isNaN(dateB)) return 0;
                        return dateB - dateA;
                    });

                    allItems = allItems.slice(0, 15);

                    if (allItems.length === 0) {
                        rssFeedContainer.innerHTML = `
                                <div style="padding:15px 0; text-align:center; color:var(--text-muted); font-size:0.7rem;">
                                    <i class="fas fa-newspaper" style="color:var(--accent);"></i><br><br>Нет новостей
                                </div>
                            `;
                        return;
                    }

                    let html = '';
                    allItems.forEach(item => {
                        const title = item.title.length > 70 ? item.title.slice(0, 70) + '…' : item.title;
                        const dateStr = item.date ? new Date(item.date).toLocaleDateString('ru-RU', { day: 'numeric',
                            month: 'short' }) : '';
                        html += `
                                <div class="rss-item">
                                    <div class="title"><a href="${item.link}" target="_blank" rel="noopener">${title}</a></div>
                                    <div class="rss-meta">
                                        <span class="source">${item.source}</span>
                                        ${dateStr ? `<span>${dateStr}</span>` : ''}
                                    </div>
                                </div>
                            `;
                    });
                    rssFeedContainer.innerHTML = html;
                } catch (error) {
                    console.warn('RSS error:', error);
                    rssFeedContainer.innerHTML = `
                            <div style="padding:15px 0; text-align:center; color:var(--text-muted); font-size:0.7rem;">
                                <i class="fas fa-exclamation-triangle" style="color:var(--accent);"></i><br><br>Ошибка загрузки
                            </div>
                        `;
                }
            }

            fetchRSS();
            setInterval(fetchRSS, 600000);

            document.getElementById('refreshRssBtn').addEventListener('click', () => {
                const btn = document.getElementById('refreshRssBtn');
                btn.style.transform = 'rotate(360deg)';
                fetchRSS().finally(() => {
                    setTimeout(() => { btn.style.transform = ''; }, 300);
                });
            });

            // === СКРЫТИЕ RSS (ИСПРАВЛЕНО) ===
            const leftColumn = document.getElementById('leftColumn');
            const toggleBtn = document.getElementById('toggleRssBtn');

            toggleBtn.addEventListener('click', () => {
                leftColumn.classList.toggle('collapsed');
                toggleBtn.classList.toggle('collapsed');

                // Перерисовываем canvas после анимации
                setTimeout(() => {
                    if (window.resizeDrawCanvas) window.resizeDrawCanvas();
                }, 350);
            });

            // === РАДИО ===
            const audio = new Audio();
            audio.volume = 0.7;

            const vinylContainer = document.getElementById('vinylContainer');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const trackName = document.getElementById('trackName');
            const stationName = document.getElementById('stationName');
            const volumeSlider = document.getElementById('volumeSlider');

            function updateStationInfo(index) {
                const s = stations[index];
                trackName.textContent = s.track;
                stationName.textContent = s.station;
                currentStationLabel.textContent = s.track;
                renderStationDropdown();
            }

            function playRadio(index) {
                const url = stations[index].value;
                if (audio.src !== url) {
                    audio.src = url;
                    audio.load();
                }
                audio.play().catch(e => console.warn('Play error:', e));
                vinylContainer.classList.add('playing');
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                updateStationInfo(index);
                currentStationIndex = index;
            }

            function pauseRadio() {
                audio.pause();
                vinylContainer.classList.remove('playing');
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }

            function stopRadio() {
                audio.pause();
                audio.currentTime = 0;
                audio.src = '';
                vinylContainer.classList.remove('playing');
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                trackName.textContent = 'Выберите станцию';
                stationName.textContent = 'Нажмите Play';
            }

            playBtn.addEventListener('click', () => {
                if (audio.src && !audio.paused) {
                    pauseRadio();
                } else {
                    playRadio(currentStationIndex);
                }
            });

            stopBtn.addEventListener('click', stopRadio);

            prevBtn.addEventListener('click', () => {
                const newIndex = (currentStationIndex - 1 + stations.length) % stations.length;
                if (audio.src && !audio.paused) {
                    playRadio(newIndex);
                } else {
                    currentStationIndex = newIndex;
                    updateStationInfo(newIndex);
                }
            });

            nextBtn.addEventListener('click', () => {
                const newIndex = (currentStationIndex + 1) % stations.length;
                if (audio.src && !audio.paused) {
                    playRadio(newIndex);
                } else {
                    currentStationIndex = newIndex;
                    updateStationInfo(newIndex);
                }
            });

            volumeSlider.addEventListener('input', (e) => {
                audio.volume = parseFloat(e.target.value);
            });

            renderStationDropdown();
            updateStationInfo(0);

            // === ПЕРЕКЛЮЧЕНИЕ МЕЖДУ РИСОВАЛКОЙ И ТЕКСТОВЫМ РЕДАКТОРОМ ===
            const switcherBtns = document.querySelectorAll('.switcher-btn');
            const drawContent = document.getElementById('drawContent');
            const textContent = document.getElementById('textContent');

            switcherBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    switcherBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const target = btn.dataset.target;

                    if (target === 'draw') {
                        drawContent.classList.remove('hidden');
                        textContent.classList.add('hidden');
                        // Перерисовываем canvas
                        setTimeout(() => {
                            if (window.resizeDrawCanvas) window.resizeDrawCanvas();
                        }, 50);
                    } else {
                        drawContent.classList.add('hidden');
                        textContent.classList.remove('hidden');
                    }
                });
            });

            // === РИСОВАНИЕ ===
            const canvas = document.getElementById('drawCanvas');
            const ctx = canvas.getContext('2d');
            const drawArea = document.getElementById('drawArea');
            let isDrawing = false;
            let drawColor = '#ffffff';
            let drawSize = 3;
            let isEraser = false;
            let isFillMode = false;
            let history = [];
            let historyIndex = -1;
            let isInitialized = false;

            // Цвета (расширенная палитра)
            const colors = [
                '#ffffff', '#cccccc', '#888888', '#444444', '#000000',
                '#ff6b6b', '#ee5a24', '#f97316', '#ff9f43', '#feca57',
                '#ffd93d', '#fdcb6e', '#6ab04c', '#00b894', '#00cec9',
                '#0984e3', '#4fc3ff', '#74b9ff', '#a29bfe', '#6c5ce7',
                '#fd79a8', '#f472b6', '#e84393', '#fd79a8', '#e17055',
            ];

            const drawColorsContainer = document.getElementById('drawColors');

            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot' + (c === '#ffffff' ? ' active' : '');
                dot.style.background = c;
                dot.dataset.color = c;
                dot.addEventListener('click', () => {
                    document.querySelectorAll('.draw-colors .color-dot').forEach(d => d.classList.remove(
                    'active'));
                    dot.classList.add('active');
                    drawColor = c;
                    isEraser = false;
                    isFillMode = false;
                    document.getElementById('drawEraser').classList.remove('active');
                    document.getElementById('drawEraser').innerHTML = '<i class="fas fa-pencil"></i>';
                    document.getElementById('drawFill').classList.remove('active');
                    document.getElementById('drawFill').innerHTML = '<i class="fas fa-fill-drip"></i>';
                });
                drawColorsContainer.appendChild(dot);
            });

            function resizeDrawCanvas() {
                const rect = drawArea.getBoundingClientRect();
                canvas.width = rect.width || 300;
                canvas.height = rect.height || 200;
                if (isInitialized) {
                    restoreFromHistory();
                }
            }
            window.resizeDrawCanvas = resizeDrawCanvas;

            function saveToHistory() {
                if (historyIndex < history.length - 1) {
                    history = history.slice(0, historyIndex + 1);
                }
                history.push(canvas.toDataURL());
                historyIndex = history.length - 1;
                if (history.length > 50) {
                    history.shift();
                    historyIndex--;
                }
            }

            function restoreFromHistory() {
                if (historyIndex >= 0 && history[historyIndex]) {
                    const img = new Image();
                    img.onload = () => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0);
                    };
                    img.src = history[historyIndex];
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (canvas.width / rect.width),
                    y: (clientY - rect.top) * (canvas.height / rect.height)
                };
            }

            function startDraw(e) {
                e.preventDefault();
                if (isFillMode) {
                    // Заливка
                    const pos = getPos(e);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    const idx = (Math.floor(pos.y) * canvas.width + Math.floor(pos.x)) * 4;
                    const targetR = data[idx];
                    const targetG = data[idx + 1];
                    const targetB = data[idx + 2];
                    const targetA = data[idx + 3];

                    const fillColor = drawColor;
                    const hex = fillColor.replace('#', '');
                    const r = parseInt(hex.substring(0, 2), 16);
                    const g = parseInt(hex.substring(2, 4), 16);
                    const b = parseInt(hex.substring(4, 6), 16);

                    const stack = [
                        [Math.floor(pos.x), Math.floor(pos.y)]
                    ];
                    const visited = new Set();
                    const width = canvas.width;
                    const height = canvas.height;

                    while (stack.length > 0) {
                        const [x, y] = stack.pop();
                        const key = `${x},${y}`;
                        if (visited.has(key)) continue;
                        if (x < 0 || x >= width || y < 0 || y >= height) continue;
                        const idx2 = (y * width + x) * 4;
                        if (Math.abs(data[idx2] - targetR) > 5 ||
                            Math.abs(data[idx2 + 1] - targetG) > 5 ||
                            Math.abs(data[idx2 + 2] - targetB) > 5) continue;

                        visited.add(key);
                        data[idx2] = r;
                        data[idx2 + 1] = g;
                        data[idx2 + 2] = b;
                        data[idx2 + 3] = 255;

                        stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                    }

                    ctx.putImageData(imageData, 0, 0);
                    saveToHistory();
                    return;
                }

                isDrawing = true;
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }

            function draw(e) {
                e.preventDefault();
                if (!isDrawing) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = isEraser ? 'rgba(0,0,0,0)' : drawColor;
                ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
                ctx.lineWidth = isEraser ? drawSize * 3 : drawSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.globalCompositeOperation = 'source-over';
            }

            function endDraw(e) {
                if (!isDrawing) return;
                isDrawing = false;
                ctx.beginPath();
                ctx.globalCompositeOperation = 'source-over';
                saveToHistory();
            }

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);

            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', endDraw, { passive: false });

            // Ластик
            document.getElementById('drawEraser').addEventListener('click', function() {
                isEraser = !isEraser;
                isFillMode = false;
                this.classList.toggle('active');
                document.getElementById('drawFill').classList.remove('active');
                document.getElementById('drawFill').innerHTML = '<i class="fas fa-fill-drip"></i>';
                document.querySelectorAll('.draw-colors .color-dot').forEach(d => d.classList.remove('active'));
                if (isEraser) {
                    this.innerHTML = '<i class="fas fa-eraser"></i>';
                } else {
                    this.innerHTML = '<i class="fas fa-pencil"></i>';
                }
            });

            // Заливка
            document.getElementById('drawFill').addEventListener('click', function() {
                isFillMode = !isFillMode;
                isEraser = false;
                this.classList.toggle('active');
                document.getElementById('drawEraser').classList.remove('active');
                document.getElementById('drawEraser').innerHTML = '<i class="fas fa-pencil"></i>';
                if (isFillMode) {
                    this.innerHTML = '<i class="fas fa-fill-drip" style="color:var(--accent);"></i>';
                } else {
                    this.innerHTML = '<i class="fas fa-fill-drip"></i>';
                }
            });

            // Размер
            const drawSizeInput = document.getElementById('drawSize');
            const drawSizeLabel = document.getElementById('drawSizeLabel');
            drawSizeInput.addEventListener('input', () => {
                drawSize = parseInt(drawSizeInput.value);
                drawSizeLabel.textContent = drawSize;
            });

            // Очистить
            document.getElementById('drawClear').addEventListener('click', () => {
                if (confirm('Очистить холст?')) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    saveToHistory();
                }
            });

            // Отменить
            document.getElementById('drawUndo').addEventListener('click', () => {
                if (historyIndex > 0) {
                    historyIndex--;
                    restoreFromHistory();
                }
            });

            function initCanvas() {
                resizeDrawCanvas();
                ctx.fillStyle = 'rgba(0,0,0,0.02)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                isInitialized = true;
                saveToHistory();
            }

            initCanvas();
            window.addEventListener('resize', resizeDrawCanvas);

            // === ТЕКСТОВЫЙ РЕДАКТОР ===
            const textEditor = document.getElementById('textEditor');
            const textWords = document.getElementById('textWords');
            const textChars = document.getElementById('textChars');

            function updateTextStats() {
                const text = textEditor.value;
                const words = text.trim() ? text.trim().split(/\s+/).length : 0;
                const chars = text.length;
                textWords.textContent = `${words} слов`;
                textChars.textContent = `${chars} символов`;
            }

            textEditor.addEventListener('input', updateTextStats);

            // Загрузка сохранённого текста
            const savedText = localStorage.getItem('dashboard_text');
            if (savedText) {
                textEditor.value = savedText;
                updateTextStats();
            }

            document.getElementById('textSave').addEventListener('click', () => {
                localStorage.setItem('dashboard_text', textEditor.value);
                const btn = document.getElementById('textSave');
                btn.innerHTML = '<i class="fas fa-check"></i> Сохранено';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-save"></i> Сохранить';
                }, 1500);
            });

            document.getElementById('textClear').addEventListener('click', () => {
                if (confirm('Очистить текст?')) {
                    textEditor.value = '';
                    updateTextStats();
                    localStorage.removeItem('dashboard_text');
                }
            });

        })();
    </script>

</body>
</html>
