<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой уголок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.4s ease, color 0.4s ease;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        /* === ЦВЕТОВЫЕ СХЕМЫ === */
        .theme-dark {
            --bg-primary: #0d0d0d;
            --bg-secondary: #121212;
            --bg-widget: #1c1c1c;
            --bg-widget-alt: #181818;
            --bg-input: #242424;
            --bg-hover: rgba(255,255,255,0.04);
            --text-primary: #e5e5e5;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border-color: rgba(255,255,255,0.04);
            --border-hover: rgba(255,255,255,0.08);
            --accent: #f97316;
            --accent-hover: #ff8c38;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-light {
            --bg-primary: #f0f0f0;
            --bg-secondary: #ffffff;
            --bg-widget: #f8f8f8;
            --bg-widget-alt: #f0f0f0;
            --bg-input: #e8e8e8;
            --bg-hover: rgba(0,0,0,0.04);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border-color: rgba(0,0,0,0.06);
            --border-hover: rgba(0,0,0,0.12);
            --accent: #e8600c;
            --accent-hover: #f97316;
            --shadow: rgba(0,0,0,0.15);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-ocean {
            --bg-primary: #0a1628;
            --bg-secondary: #0f2040;
            --bg-widget: #152b4a;
            --bg-widget-alt: #122240;
            --bg-input: #1a3355;
            --bg-hover: rgba(100,180,255,0.06);
            --text-primary: #d0e4ff;
            --text-secondary: #8ab4f8;
            --text-muted: #5a7a9a;
            --border-color: rgba(100,180,255,0.08);
            --border-hover: rgba(100,180,255,0.15);
            --accent: #4fc3ff;
            --accent-hover: #7ad0ff;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-forest {
            --bg-primary: #0a1a0a;
            --bg-secondary: #0f240f;
            --bg-widget: #163016;
            --bg-widget-alt: #122812;
            --bg-input: #1a3a1a;
            --bg-hover: rgba(100,200,100,0.06);
            --text-primary: #d4e8d4;
            --text-secondary: #7ab87a;
            --text-muted: #4a7a4a;
            --border-color: rgba(100,200,100,0.08);
            --border-hover: rgba(100,200,100,0.15);
            --accent: #66d966;
            --accent-hover: #88e888;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-sunset {
            --bg-primary: #1a0a0a;
            --bg-secondary: #2a1010;
            --bg-widget: #3a1818;
            --bg-widget-alt: #301414;
            --bg-input: #4a2020;
            --bg-hover: rgba(255,150,100,0.06);
            --text-primary: #f5d0c0;
            --text-secondary: #e89070;
            --text-muted: #9a6a5a;
            --border-color: rgba(255,150,100,0.08);
            --border-hover: rgba(255,150,100,0.15);
            --accent: #ff7f50;
            --accent-hover: #ff9a70;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-midnight {
            --bg-primary: #0a0a1a;
            --bg-secondary: #10102a;
            --bg-widget: #18183a;
            --bg-widget-alt: #141430;
            --bg-input: #20204a;
            --bg-hover: rgba(150,100,255,0.06);
            --text-primary: #d0d0f0;
            --text-secondary: #9090d0;
            --text-muted: #5a5a8a;
            --border-color: rgba(150,100,255,0.08);
            --border-hover: rgba(150,100,255,0.15);
            --accent: #a78bfa;
            --accent-hover: #c4b5fd;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-cyber {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f1a;
            --bg-widget: #1a1a2e;
            --bg-widget-alt: #14142a;
            --bg-input: #22223a;
            --bg-hover: rgba(0,255,255,0.06);
            --text-primary: #b0f0f0;
            --text-secondary: #70d0d0;
            --text-muted: #4a7a7a;
            --border-color: rgba(0,255,255,0.08);
            --border-hover: rgba(0,255,255,0.15);
            --accent: #00ffff;
            --accent-hover: #66ffff;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-rose {
            --bg-primary: #1a0a14;
            --bg-secondary: #2a0f1e;
            --bg-widget: #3a1528;
            --bg-widget-alt: #301222;
            --bg-input: #4a1a32;
            --bg-hover: rgba(255,100,150,0.06);
            --text-primary: #f0d0e0;
            --text-secondary: #d080b0;
            --text-muted: #8a5a7a;
            --border-color: rgba(255,100,150,0.08);
            --border-hover: rgba(255,100,150,0.15);
            --accent: #f472b6;
            --accent-hover: #f9a8d4;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-coffee {
            --bg-primary: #14100a;
            --bg-secondary: #1e1812;
            --bg-widget: #2a221a;
            --bg-widget-alt: #241e16;
            --bg-input: #362c22;
            --bg-hover: rgba(200,170,130,0.06);
            --text-primary: #e8ddd0;
            --text-secondary: #b0a090;
            --text-muted: #7a6a5a;
            --border-color: rgba(200,170,130,0.08);
            --border-hover: rgba(200,170,130,0.15);
            --accent: #d4a373;
            --accent-hover: #e0b88a;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-aurora {
            --bg-primary: #0a0a14;
            --bg-secondary: #0a1420;
            --bg-widget: #0f2030;
            --bg-widget-alt: #0a1a2a;
            --bg-input: #142a3a;
            --bg-hover: rgba(50,200,180,0.06);
            --text-primary: #d0f0e8;
            --text-secondary: #80d0c0;
            --text-muted: #4a8a7a;
            --border-color: rgba(50,200,180,0.08);
            --border-hover: rgba(50,200,180,0.15);
            --accent: #5eead4;
            --accent-hover: #8ff0e0;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-lavender {
            --bg-primary: #140a1a;
            --bg-secondary: #1e1028;
            --bg-widget: #2a1838;
            --bg-widget-alt: #241430;
            --bg-input: #36204a;
            --bg-hover: rgba(180,100,255,0.06);
            --text-primary: #e8d8f0;
            --text-secondary: #b090d0;
            --text-muted: #7a5a8a;
            --border-color: rgba(180,100,255,0.08);
            --border-hover: rgba(180,100,255,0.15);
            --accent: #c084fc;
            --accent-hover: #d8a8fc;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }
        .theme-matrix {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0a100a;
            --bg-widget: #0f1a0f;
            --bg-widget-alt: #0a160a;
            --bg-input: #142014;
            --bg-hover: rgba(0,200,0,0.06);
            --text-primary: #b0e8b0;
            --text-secondary: #60b060;
            --text-muted: #3a6a3a;
            --border-color: rgba(0,200,0,0.08);
            --border-hover: rgba(0,200,0,0.15);
            --accent: #00cc00;
            --accent-hover: #33ff33;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }

        /* === ОСНОВНОЙ КОНТЕЙНЕР (сетка 8x8) === */
        .dashboard {
            max-width: 1200px;
            width: 90%;
            height: 90vh;
            max-height: 800px;
            display: grid;
            grid-template-columns: 2fr 6fr;
            grid-template-rows: 4fr 4fr;
            gap: 12px;
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 32px;
            box-shadow: 0 25px 60px var(--shadow);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .widget {
            background: var(--bg-widget);
            border-radius: 24px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            transition: background 0.4s ease, border-color 0.2s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .widget:hover {
            border-color: var(--border-hover);
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-shrink: 0;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.65rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .widget-header i {
            font-size: 0.8rem;
            color: var(--accent);
            width: 16px;
            transition: color 0.4s ease;
        }

        .widget-header .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 400;
            color: var(--text-muted);
            text-transform: none;
            font-size: 0.6rem;
        }

        /* === РАДИО (2x4 — левый верхний) === */
        .player-widget {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            background: var(--bg-widget-alt);
        }

        .player-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 10px;
        }

        .vinyl-container {
            flex-shrink: 0;
            width: 110px;
            height: 110px;
            position: relative;
            border-radius: 50%;
        }

        .vinyl-container svg {
            width: 100%;
            height: 100%;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        .vinyl-container.playing svg {
            animation-play-state: running;
        }

        .vinyl-container.playing .vinyl-shadow {
            animation: pulseShadow 2s ease-in-out infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseShadow {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(1.05); }
        }

        .vinyl-shadow {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 70%);
            opacity: 0;
            filter: blur(15px);
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 0;
        }

        .vinyl-container.playing .vinyl-shadow {
            opacity: 0.25;
        }

        .radio-info {
            width: 100%;
            text-align: center;
        }

        .radio-info .track {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .radio-info .station {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .player-controls button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 30px;
            transition: 0.2s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-controls button:hover {
            background: var(--bg-input);
            color: var(--accent);
        }

        .player-controls .play-btn {
            background: var(--accent);
            color: var(--bg-primary);
            width: 42px;
            height: 42px;
            font-size: 0.95rem;
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.25);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .player-controls .play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .player-controls input[type="range"] {
            width: 45px;
            background: var(--bg-input);
            height: 2px;
            border-radius: 10px;
            accent-color: var(--accent);
        }

        /* === ЧАСЫ (2x4 — левый нижний) === */
        .clock-widget {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            background: var(--bg-widget);
        }

        .clock-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .clock-content.hidden {
            display: none;
        }

        .clock-time {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.4s ease;
            line-height: 1.1;
        }

        .clock-date {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        /* Календарь */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            text-align: center;
            width: 100%;
            max-width: 220px;
        }

        .calendar-grid .day-name {
            font-size: 0.45rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 1px 0;
        }

        .calendar-grid .day {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 2px 0;
            border-radius: 4px;
            transition: 0.15s;
        }

        .calendar-grid .day.weekend {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .calendar-grid .day.today {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
            border-radius: 4px;
        }

        .calendar-grid .day.empty {
            color: transparent;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 220px;
            margin-bottom: 4px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* RSS компактный */
        .rss-feed-compact {
            width: 100%;
            max-width: 220px;
            max-height: 80px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .rss-feed-compact::-webkit-scrollbar {
            width: 2px;
        }
        .rss-feed-compact::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .rss-item-compact {
            padding: 3px 6px;
            border-radius: 4px;
            background: var(--bg-hover);
            font-size: 0.6rem;
            color: var(--text-secondary);
            border-left: 2px solid transparent;
            transition: 0.15s;
            cursor: default;
        }

        .rss-item-compact:hover {
            border-left-color: var(--accent);
        }

        .rss-item-compact a {
            color: inherit;
            text-decoration: none;
        }

        .rss-item-compact a:hover {
            color: var(--accent);
        }

        .rss-item-compact .rss-source {
            font-size: 0.4rem;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* Погода компактная */
        .weather-display-compact {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
        }

        .weather-display-compact .weather-icon {
            font-size: 2rem;
            color: var(--accent);
        }

        .weather-display-compact .weather-temp {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .weather-display-compact .weather-desc {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .weather-display-compact .weather-details {
            display: flex;
            gap: 10px;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .weather-display-compact .weather-details span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* === ПЕРЕКЛЮЧЕНИЕ ДЛЯ ЧАСОВ (стрелочки) === */
        .mode-switcher {
            display: flex;
            gap: 2px;
        }

        .mode-switcher .mode-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.6rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            border: 1px solid transparent;
            opacity: 0.4;
        }

        .mode-switcher .mode-btn:hover {
            opacity: 0.8;
            color: var(--text-secondary);
            background: var(--bg-hover);
        }

        .mode-switcher .mode-btn.active {
            opacity: 1;
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(249, 115, 22, 0.08);
        }

        /* === РИСОВАЛКА + ТЕКСТОВЫЙ РЕДАКТОР (6x8 — правая часть) === */
        .draw-widget {
            grid-column: 2 / 3;
            grid-row: 1 / 3;
            background: var(--bg-widget-alt);
        }

        .draw-area {
            flex: 1;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            cursor: crosshair;
            touch-action: none;
            min-height: 150px;
        }

        .draw-area canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .draw-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .draw-controls button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.55rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
            height: 24px;
        }

        .draw-controls button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .draw-controls button.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .draw-colors {
            display: flex;
            gap: 3px;
            flex-wrap: nowrap;
            overflow-x: auto;
            max-width: 180px;
            padding: 2px 0;
        }

        .draw-colors::-webkit-scrollbar {
            height: 2px;
        }
        .draw-colors::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .draw-colors .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .draw-colors .color-dot:hover {
            transform: scale(1.15);
        }

        .draw-colors .color-dot.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }

        .draw-controls .size-control {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .draw-controls .size-control input {
            width: 35px;
            accent-color: var(--accent);
            background: var(--bg-input);
            height: 2px;
        }

        .draw-controls .size-control span {
            font-size: 0.5rem;
            color: var(--text-muted);
            min-width: 14px;
        }

        /* === ТЕКСТОВЫЙ РЕДАКТОР === */
        .text-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .text-editor textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 14px;
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            color: var(--text-primary);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            min-height: 100px;
            line-height: 1.6;
        }

        .text-editor textarea:focus {
            border-color: var(--accent);
        }

        .text-editor textarea::placeholder {
            color: var(--text-muted);
        }

        .text-editor .editor-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .text-editor .editor-controls button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 0.55rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            height: 24px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .text-editor .editor-controls button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .text-editor .editor-stats {
            font-size: 0.5rem;
            color: var(--text-muted);
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .widget-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .widget-content.hidden {
            display: none;
        }

        /* === ДРОПДАУН СТАНЦИЙ === */
        .station-dropdown {
            position: relative;
            display: inline-block;
            z-index: 9999;
        }

        .station-dropdown-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 3px 10px 3px 10px;
            border-radius: 30px;
            font-size: 0.55rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.4s ease, color 0.4s ease;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-dropdown-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }

        .station-dropdown-btn i {
            font-size: 0.5rem;
            color: var(--text-muted);
            transition: transform 0.3s;
            flex-shrink: 0;
        }

        .station-dropdown-btn.open i {
            transform: rotate(180deg);
        }

        .station-dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: var(--bg-widget);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 4px 0;
            min-width: 160px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 12px 40px var(--shadow);
            display: none;
            backdrop-filter: blur(8px);
        }

        .station-dropdown-menu.open {
            display: block;
        }

        .station-dropdown-menu::-webkit-scrollbar {
            width: 3px;
        }
        .station-dropdown-menu::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .station-dropdown-item {
            padding: 5px 12px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            border-left: 2px solid transparent;
        }

        .station-dropdown-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-left-color: var(--accent);
        }

        .station-dropdown-item.active {
            color: var(--accent);
            font-weight: 600;
            border-left-color: var(--accent);
        }

        .station-dropdown-item .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
        }

        .station-dropdown-item.active .dot {
            background: var(--accent);
        }

        /* === ВЫБОР ТЕМЫ (сворачиваемый) === */
        .theme-wrapper {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: var(--bg-widget);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 4px 16px var(--shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        .theme-toggle .fa-palette {
            transition: transform 0.4s ease;
        }

        .theme-toggle.open .fa-palette {
            transform: rotate(180deg);
        }

        .theme-picker {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px var(--shadow);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            transform-origin: bottom right;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding: 0 12px;
            gap: 0;
        }

        .theme-picker.open {
            max-height: 60px;
            opacity: 1;
            padding: 8px 12px;
            gap: 6px;
        }

        .theme-picker .theme-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .theme-picker .theme-dot:hover {
            transform: scale(1.15);
        }

        .theme-picker .theme-dot.active {
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(249, 115, 22, 0.3);
        }

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 1024px) {
            .dashboard {
                width: 95%;
                height: auto;
                max-height: none;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto auto;
            }
            .player-widget {
                grid-column: 1 / 2;
                grid-row: 1 / 2;
            }
            .clock-widget {
                grid-column: 2 / 3;
                grid-row: 1 / 2;
            }
            .draw-widget {
                grid-column: 1 / 3;
                grid-row: 2 / 3;
                min-height: 300px;
            }
            .vinyl-container {
                width: 90px;
                height: 90px;
            }
            .clock-time {
                font-size: 2.2rem;
            }
            .draw-colors {
                max-width: 140px;
            }
        }

        @media (max-width: 700px) {
            .dashboard {
                width: 98%;
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                padding: 10px;
                gap: 10px;
                border-radius: 20px;
            }
            .player-widget {
                grid-column: 1 / 2;
                grid-row: 1 / 2;
            }
            .clock-widget {
                grid-column: 1 / 2;
                grid-row: 2 / 3;
            }
            .draw-widget {
                grid-column: 1 / 2;
                grid-row: 3 / 4;
                min-height: 280px;
            }
            .vinyl-container {
                width: 75px;
                height: 75px;
            }
            .clock-time {
                font-size: 1.8rem;
            }
            .station-dropdown-btn {
                max-width: 90px;
                font-size: 0.5rem;
            }
            .draw-colors {
                max-width: 100px;
            }
            .draw-colors .color-dot {
                width: 16px;
                height: 16px;
            }
            .theme-wrapper {
                bottom: 12px;
                right: 12px;
            }
            .theme-toggle {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            .theme-picker .theme-dot {
                width: 20px;
                height: 20px;
            }
        }

        @media (max-width: 400px) {
            body {
                padding: 8px;
            }
            .dashboard {
                padding: 6px;
                gap: 6px;
                border-radius: 16px;
            }
            .widget {
                padding: 10px 12px;
                border-radius: 16px;
            }
            .clock-time {
                font-size: 1.5rem;
            }
            .vinyl-container {
                width: 60px;
                height: 60px;
            }
            .draw-colors {
                max-width: 70px;
            }
            .draw-colors .color-dot {
                width: 14px;
                height: 14px;
            }
            .theme-wrapper {
                bottom: 8px;
                right: 8px;
            }
            .theme-toggle {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
            .theme-picker .theme-dot {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>

                    </svg>
                </div>
                <div class="radio-info">

    <script>
        (function() {
            'use strict';

            // === СПИСОК РАДИОСТАНЦИЙ ===
            const stations = [
                { value: 'https://ice1.somafm.com/groovesalad-128-mp3', track: 'Groove Salad', station: 'SomaFM · Chillout' },
                { value: 'https://ice1.somafm.com/darkzone-128-mp3', track: 'The Dark Zone', station: 'SomaFM · Ambient' },
                { value: 'https://ice1.somafm.com/defcon-128-mp3', track: 'Def Con Radio', station: 'SomaFM · Dark Ambient' },
                { value: 'https://ice1.somafm.com/metal-128-mp3', track: 'Metal Detector', station: 'SomaFM · Heavy Metal' },
                { value: 'https://ice1.somafm.com/lc70s-128-mp3', track: 'Left Coast 70s', station: 'SomaFM · 70s Hits' },
                { value: 'https://ice1.somafm.com/u80s-128-mp3', track: 'Underground 80s', station: 'SomaFM · 80s Underground' },
                { value: 'https://ice1.somafm.com/7soul-128-mp3', track: 'Seven Inch Soul', station: 'SomaFM · Soul Classics' },
                { value: 'https://ice1.somafm.com/insound-128-mp3', track: 'The In-Sound', station: 'SomaFM · 60s Garage' },
                { value: 'https://ice1.somafm.com/covers-128-mp3', track: 'Covers', station: 'SomaFM · Cover Versions' },
                { value: 'https://ice1.somafm.com/sf1033-128-mp3', track: 'SF 10-33', station: 'SomaFM · Police Radio' },
                { value: 'https://ice1.somafm.com/scanner-128-mp3', track: 'SF Police Scanner', station: 'SomaFM · Live Scanner' },
                { value: 'https://ice1.somafm.com/sfinsf-128-mp3', track: 'SF in SF', station: 'SomaFM · Live in SF' },
                { value: 'https://ice1.somafm.com/vaporwaves-128-mp3', track: 'Vaporvawes', station: 'SomaFM · Vaporwave' },
                { value: 'https://ice1.somafm.com/doomed-128-mp3', track: 'Doomed', station: 'SomaFM · Doom Metal' },
                { value: 'https://ice1.somafm.com/beatblender-128-mp3', track: 'Beat Blender', station: 'SomaFM · Deep House' },
            ];

            let currentStationIndex = 0;

            // === ДРОПДАУН СТАНЦИЙ ===
            const dropdownBtn = document.getElementById('stationDropdownBtn');
            const dropdownMenu = document.getElementById('stationDropdownMenu');
            const currentStationLabel = document.getElementById('currentStationLabel');

            function renderStationDropdown() {
                let html = '';
                stations.forEach((s, i) => {
                    html += `
                        <div class="station-dropdown-item ${i === currentStationIndex ? 'active' : ''}" data-index="${i}">
                            <span class="dot"></span>
                            ${s.track}
                        </div>
                    `;
                });
                dropdownMenu.innerHTML = html;

                dropdownMenu.querySelectorAll('.station-dropdown-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(item.dataset.index, 10);
                        selectStation(idx);
                        dropdownMenu.classList.remove('open');
                        dropdownBtn.classList.remove('open');
                    });
                });
            }

            function selectStation(index) {
                currentStationIndex = index;
                const s = stations[index];
                currentStationLabel.textContent = s.track;
                updateStationInfo(index);
                if (audio.src && !audio.paused) {
                    playRadio(index);
                }
                renderStationDropdown();
            }

            dropdownBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdownMenu.classList.toggle('open');
                dropdownBtn.classList.toggle('open');
            });

            document.addEventListener('click', () => {
                dropdownMenu.classList.remove('open');
                dropdownBtn.classList.remove('open');
            });

            // === ТЕМЫ (сворачиваемый) ===
            const themes = [
                { id: 'theme-dark', color: '#1a1a1a' },
                { id: 'theme-light', color: '#e8e8e8' },
                { id: 'theme-ocean', color: '#1a3a6a' },
                { id: 'theme-forest', color: '#1a3a1a' },
                { id: 'theme-sunset', color: '#6a2a1a' },
                { id: 'theme-midnight', color: '#2a1a4a' },
                { id: 'theme-cyber', color: '#1a3a3a' },
                { id: 'theme-rose', color: '#4a1a2a' },
                { id: 'theme-coffee', color: '#3a2a1a' },
                { id: 'theme-aurora', color: '#1a3a4a' },
                { id: 'theme-lavender', color: '#3a1a4a' },
                { id: 'theme-matrix', color: '#1a3a1a' },
            ];

            const themePicker = document.getElementById('themePicker');
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            function renderThemePicker() {
                let html = '';
                themes.forEach(t => {
                    const isActive = body.className === t.id;
                    html += `
                        <div class="theme-dot ${isActive ? 'active' : ''}" 
                             style="background:${t.color};" 
                             data-theme="${t.id}"
                             title="${t.id.replace('theme-', '')}">
                        </div>
                    `;
                });
                themePicker.innerHTML = html;

                themePicker.querySelectorAll('.theme-dot').forEach(dot => {
                    dot.addEventListener('click', () => {
                        setTheme(dot.dataset.theme);
                    });
                });
            }

            function setTheme(themeName) {
                body.className = themeName;
                localStorage.setItem('dashboard_theme', themeName);
                renderThemePicker();
            }

            // Сворачивание/разворачивание
            let isThemeOpen = false;

            themeToggle.addEventListener('click', () => {
                isThemeOpen = !isThemeOpen;
                themeToggle.classList.toggle('open', isThemeOpen);
                themePicker.classList.toggle('open', isThemeOpen);
            });

            const savedTheme = localStorage.getItem('dashboard_theme');
            if (savedTheme && themes.some(t => t.id === savedTheme)) {
                setTheme(savedTheme);
            } else {
                setTheme('theme-dark');
            }

            // === ЧАСЫ ===
            function updateClock() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('clockTime').textContent = `${hours}:${minutes}:${seconds}`;
                const options = { day: 'numeric', month: 'long', year: 'numeric' };
                document.getElementById('clockDate').textContent = now.toLocaleDateString('ru-RU', options);
            }
            updateClock();
            setInterval(updateClock, 1000);

            // === КАЛЕНДАРЬ ===
            function renderCalendar() {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const today = now.getDate();

                document.getElementById('calendarMonth').textContent = now.toLocaleDateString('ru-RU', { month: 'long' });
                document.getElementById('calendarYear').textContent = year;

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const daysInPrevMonth = new Date(year, month, 0).getDate();

                let html = '';
                const dayNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
                dayNames.forEach(name => {
                    html += `<div class="day-name">${name}</div>`;
                });

                let startOffset = firstDay === 0 ? 6 : firstDay - 1;

                for (let i = startOffset - 1; i >= 0; i--) {
                    html += `<div class="day empty">${daysInPrevMonth - i}</div>`;
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month, d);
                    const isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
                    const isToday = d === today ? 'today' : '';
                    const weekendClass = isWeekend ? 'weekend' : '';
                    html += `<div class="day ${isToday} ${weekendClass}">${d}</div>`;
                }

                const totalCells = startOffset + daysInMonth;
                const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
                for (let d = 1; d <= remaining; d++) {
                    html += `<div class="day empty">${d}</div>`;
                }

                document.getElementById('calendarGrid').innerHTML = html;
            }
            renderCalendar();

            // === RSS КОМПАКТНЫЙ ===
            const RSS_FEEDS = [
                { name: 'Meduza', url: 'https://meduza.io/rss/all' },
                { name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
                { name: 'BBC Russian', url: 'http://feeds.bbci.co.uk/russian/news/rss.xml' },
            ];

            const rssFeedCompact = document.getElementById('rssFeedCompact');

            async function fetchRSSCompact() {
                try {
                    let allItems = [];

                    for (const feed of RSS_FEEDS) {
                        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(feed.url)}`;
                        const response = await fetch(proxyUrl);
                        if (!response.ok) continue;
                        const xmlText = await response.text();

                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                        const items = xmlDoc.querySelectorAll('item');

                        items.forEach(item => {
                            const title = item.querySelector('title')?.textContent?.trim() || 'Без заголовка';
                            const link = item.querySelector('link')?.textContent?.trim() || '#';
                            allItems.push({
                                title: title,
                                link: link,
                                source: feed.name,
                            });
                        });
                    }

                    allItems = allItems.slice(0, 6);

                    if (allItems.length === 0) {
                        rssFeedCompact.innerHTML =
                            `<div style="text-align:center; padding:8px 0; color:var(--text-muted); font-size:0.55rem;">Нет новостей</div>`;
                        return;
                    }

                    let html = '';
                    allItems.forEach(item => {
                        const title = item.title.length > 50 ? item.title.slice(0, 50) + '…' : item.title;
                        html += `
                            <div class="rss-item-compact">
                                <a href="${item.link}" target="_blank" rel="noopener">${title}</a>
                                <span class="rss-source">${item.source}</span>
                            </div>
                        `;
                    });
                    rssFeedCompact.innerHTML = html;
                } catch (error) {
                    console.warn('RSS error:', error);
                    rssFeedCompact.innerHTML =
                        `<div style="text-align:center; padding:8px 0; color:var(--text-muted); font-size:0.55rem;">Ошибка загрузки</div>`;
                }
            }
            fetchRSSCompact();

            // === ПОГОДА КОМПАКТНАЯ ===
            const weatherDisplayCompact = document.getElementById('weatherDisplayCompact');

            async function fetchWeatherCompact() {
                try {
                    const response = await fetch('https://wttr.in/Moscow?format=j1&lang=ru');
                    if (!response.ok) throw new Error('Weather API error');
                    const data = await response.json();

                    const current = data.current_condition[0];
                    const temp = current.temp_C;
                    const desc = current.weatherDesc[0].value;
                    const humidity = current.humidity;
                    const wind = current.windSpeedKmph;
                    const code = current.weatherCode;

                    const iconMap = {
                        '113': 'fa-sun',
                        '116': 'fa-cloud-sun',
                        '119': 'fa-cloud',
                        '122': 'fa-cloud',
                        '143': 'fa-smog',
                        '176': 'fa-cloud-rain',
                        '179': 'fa-cloud-snow',
                        '182': 'fa-cloud-rain',
                        '185': 'fa-cloud-rain',
                        '200': 'fa-bolt',
                        '227': 'fa-snowflake',
                        '230': 'fa-snowflake',
                        '248': 'fa-smog',
                        '260': 'fa-smog',
                        '263': 'fa-cloud-rain',
                        '266': 'fa-cloud-rain',
                        '281': 'fa-cloud-rain',
                        '284': 'fa-cloud-rain',
                        '293': 'fa-cloud-rain',
                        '296': 'fa-cloud-rain',
                        '299': 'fa-cloud-rain',
                        '302': 'fa-cloud-showers-heavy',
                        '305': 'fa-cloud-showers-heavy',
                        '308': 'fa-cloud-showers-heavy',
                        '311': 'fa-cloud-rain',
                        '314': 'fa-cloud-rain',
                        '317': 'fa-cloud-rain',
                        '320': 'fa-snowflake',
                        '323': 'fa-snowflake',
                        '326': 'fa-snowflake',
                        '329': 'fa-snowflake',
                        '332': 'fa-snowflake',
                        '335': 'fa-snowflake',
                        '338': 'fa-snowflake',
                        '350': 'fa-snowflake',
                        '353': 'fa-cloud-rain',
                        '356': 'fa-cloud-showers-heavy',
                        '359': 'fa-cloud-showers-heavy',
                        '362': 'fa-cloud-rain',
                        '365': 'fa-cloud-rain',
                        '368': 'fa-snowflake',
                        '371': 'fa-snowflake',
                        '374': 'fa-snowflake',
                        '377': 'fa-snowflake',
                        '386': 'fa-bolt',
                        '389': 'fa-bolt',
                        '392': 'fa-bolt',
                        '395': 'fa-snowflake',
                    };

                    const icon = iconMap[code] || 'fa-cloud';

                    weatherDisplayCompact.innerHTML = `
                        <div class="weather-icon"><i class="fas ${icon}"></i></div>
                        <div class="weather-temp">${temp}°C</div>
                        <div class="weather-desc">${desc}</div>
                        <div class="weather-details">
                            <span><i class="fas fa-tint"></i> ${humidity}%</span>
                            <span><i class="fas fa-wind"></i> ${wind} м/с</span>
                        </div>
                    `;
                } catch (error) {
                    console.warn('Weather error:', error);
                    weatherDisplayCompact.innerHTML = `
                        <div style="text-align:center; padding:8px 0; color:var(--text-muted); font-size:0.55rem;">
                            <i class="fas fa-exclamation-triangle" style="color:var(--accent);"></i><br>Ошибка
                        </div>
                    `;
                }
            }
            fetchWeatherCompact();

            // === ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ЧАСОВ (только 2 режима) ===
            const clockModes = ['clock', 'calendar'];
            const clockModeContents = {
                clock: document.getElementById('clockMode'),
                calendar: document.getElementById('calendarMode'),
            };
            const clockModeBtns = document.querySelectorAll('#clockModeSwitcher .mode-btn');
            let clockModeIndex = 0;

            clockModeBtns.forEach((btn, idx) => {
                btn.addEventListener('click', () => {
                    clockModeIndex = idx;
                    const mode = btn.dataset.mode;
                    clockModeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    Object.keys(clockModeContents).forEach(key => {
                        clockModeContents[key].classList.toggle('hidden', key !== mode);
                    });
                });
            });

            // === ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ РИСОВАЛКИ ===
            const drawModes = ['draw', 'text'];
            const drawModeContents = {
                draw: document.getElementById('drawMode'),
                text: document.getElementById('textMode'),
            };
            const drawModeBtns = document.querySelectorAll('#drawModeSwitcher .mode-btn');
            let drawModeIndex = 0;

            drawModeBtns.forEach((btn, idx) => {
                btn.addEventListener('click', () => {
                    drawModeIndex = idx;
                    const mode = btn.dataset.mode;
                    drawModeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    Object.keys(drawModeContents).forEach(key => {
                        drawModeContents[key].classList.toggle('hidden', key !== mode);
                    });

                    if (mode === 'draw') {
                        setTimeout(() => {
                            if (window.resizeDrawCanvas) window.resizeDrawCanvas();
                        }, 50);
                    }
                });
            });

            // === РАДИО ===
            const audio = new Audio();
            audio.volume = 0.7;

            const vinylContainer = document.getElementById('vinylContainer');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const trackName = document.getElementById('trackName');
            const stationName = document.getElementById('stationName');
            const volumeSlider = document.getElementById('volumeSlider');

            function updateStationInfo(index) {
                const s = stations[index];
                trackName.textContent = s.track;
                stationName.textContent = s.station;
                currentStationLabel.textContent = s.track;
                renderStationDropdown();
            }

            function playRadio(index) {
                const url = stations[index].value;
                if (audio.src !== url) {
                    audio.src = url;
                    audio.load();
                }
                audio.play().catch(e => console.warn('Play error:', e));
                vinylContainer.classList.add('playing');
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                updateStationInfo(index);
                currentStationIndex = index;
            }

            function pauseRadio() {
                audio.pause();
                vinylContainer.classList.remove('playing');
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }

            function stopRadio() {
                audio.pause();
                audio.currentTime = 0;
                audio.src = '';
                vinylContainer.classList.remove('playing');
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                trackName.textContent = 'Выберите станцию';
                stationName.textContent = 'Нажмите Play';
            }

            playBtn.addEventListener('click', () => {
                if (audio.src && !audio.paused) {
                    pauseRadio();
                } else {
                    playRadio(currentStationIndex);
                }
            });

            stopBtn.addEventListener('click', stopRadio);

            prevBtn.addEventListener('click', () => {
                const newIndex = (currentStationIndex - 1 + stations.length) % stations.length;
                if (audio.src && !audio.paused) {
                    playRadio(newIndex);
                } else {
                    currentStationIndex = newIndex;
                    updateStationInfo(newIndex);
                }
            });

            nextBtn.addEventListener('click', () => {
                const newIndex = (currentStationIndex + 1) % stations.length;
                if (audio.src && !audio.paused) {
                    playRadio(newIndex);
                } else {
                    currentStationIndex = newIndex;
                    updateStationInfo(newIndex);
                }
            });

            volumeSlider.addEventListener('input', (e) => {
                audio.volume = parseFloat(e.target.value);
            });

            renderStationDropdown();
            updateStationInfo(0);

            // === РИСОВАНИЕ ===
            const canvas = document.getElementById('drawCanvas');
            const ctx = canvas.getContext('2d');
            const drawArea = document.getElementById('drawArea');
            let isDrawing = false;
            let drawColor = '#ffffff';
            let drawSize = 3;
            let isEraser = true;
            let history = [];
            let historyIndex = -1;
            let isInitialized = false;

            // Цвета
            const colors = [
                '#ffffff', '#cccccc', '#888888', '#444444', '#000000',
                '#ff6b6b', '#ee5a24', '#f97316', '#ff9f43', '#feca57',
                '#ffd93d', '#fdcb6e', '#6ab04c', '#00b894', '#00cec9',
                '#0984e3', '#4fc3ff', '#74b9ff', '#a29bfe', '#6c5ce7',
                '#fd79a8', '#f472b6', '#e84393', '#fd79a8', '#e17055',
            ];

            const drawColorsContainer = document.getElementById('drawColors');

            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = c;
                dot.dataset.color = c;
                dot.addEventListener('click', () => {
                    document.querySelectorAll('.draw-colors .color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    drawColor = c;
                    isEraser = false;
                    document.getElementById('drawEraser').classList.remove('active');
                    document.getElementById('drawEraser').innerHTML = '<i class="fas fa-eraser"></i>';
                });
                drawColorsContainer.appendChild(dot);
            });

            // Выбираем белый по умолчанию
            document.querySelector('.draw-colors .color-dot').classList.add('active');

            function resizeDrawCanvas() {
                const rect = drawArea.getBoundingClientRect();
                canvas.width = rect.width || 300;
                canvas.height = rect.height || 200;
                if (isInitialized) {
                    restoreFromHistory();
                }
            }
            window.resizeDrawCanvas = resizeDrawCanvas;

            function saveToHistory() {
                if (historyIndex < history.length - 1) {
                    history = history.slice(0, historyIndex + 1);
                }
                history.push(canvas.toDataURL());
                historyIndex = history.length - 1;
                if (history.length > 50) {
                    history.shift();
                    historyIndex--;
                }
            }

            function restoreFromHistory() {
                if (historyIndex >= 0 && history[historyIndex]) {
                    const img = new Image();
                    img.onload = () => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0);
                    };
                    img.src = history[historyIndex];
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (canvas.width / rect.width),
                    y: (clientY - rect.top) * (canvas.height / rect.height)
                };
            }

            function startDraw(e) {
                e.preventDefault();
                isDrawing = true;
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }

            function draw(e) {
                e.preventDefault();
                if (!isDrawing) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);

                if (isEraser) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = drawSize * 2.5;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.lineWidth = drawSize;
                    ctx.strokeStyle = drawColor;
                }

                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.globalCompositeOperation = 'source-over';
            }

            function endDraw(e) {
                if (!isDrawing) return;
                isDrawing = false;
                ctx.beginPath();
                ctx.globalCompositeOperation = 'source-over';
                saveToHistory();
            }

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);

            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', endDraw, { passive: false });

            // Ластик (исправлен)
            document.getElementById('drawEraser').addEventListener('click', function() {
                isEraser = !isEraser;
                this.classList.toggle('active');

                if (isEraser) {
                    this.innerHTML = '<i class="fas fa-eraser" style="color:var(--accent);"></i>';
                    document.querySelectorAll('.draw-colors .color-dot').forEach(d => d.classList.remove('active'));
                } else {
                    this.innerHTML = '<i class="fas fa-eraser"></i>';
                    // Возвращаем последний выбранный цвет
                    const activeColor = document.querySelector('.draw-colors .color-dot.active');
                    if (activeColor) {
                        drawColor = activeColor.dataset.color;
                    } else {
                        const firstColor = document.querySelector('.draw-colors .color-dot');
                        if (firstColor) {
                            firstColor.classList.add('active');
                            drawColor = firstColor.dataset.color;
                        }
                    }
                }
            });

            // Размер
            const drawSizeInput = document.getElementById('drawSize');
            const drawSizeLabel = document.getElementById('drawSizeLabel');
            drawSizeInput.addEventListener('input', () => {
                drawSize = parseInt(drawSizeInput.value);
                drawSizeLabel.textContent = drawSize;
            });

            // Очистить
            document.getElementById('drawClear').addEventListener('click', () => {
                if (confirm('Очистить холст?')) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    saveToHistory();
                }
            });

            // Отменить
            document.getElementById('drawUndo').addEventListener('click', () => {
                if (historyIndex > 0) {
                    historyIndex--;
                    restoreFromHistory();
                }
            });

            function initCanvas() {
                resizeDrawCanvas();
                ctx.fillStyle = 'rgba(0,0,0,0.02)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                isInitialized = true;
                saveToHistory();
            }

            initCanvas();
            window.addEventListener('resize', resizeDrawCanvas);

            // === ТЕКСТОВЫЙ РЕДАКТОР ===
            const textEditor = document.getElementById('textEditor');
            const textWords = document.getElementById('textWords');
            const textChars = document.getElementById('textChars');

            function updateTextStats() {
                const text = textEditor.value;
                const words = text.trim() ? text.trim().split(/\s+/).length : 0;
                const chars = text.length;
                textWords.textContent = `${words} слов`;
                textChars.textContent = `${chars} символов`;
            }

            textEditor.addEventListener('input', updateTextStats);

            const savedText = localStorage.getItem('dashboard_text');
            if (savedText) {
                textEditor.value = savedText;
                updateTextStats();
            }

            document.getElementById('textSave').addEventListener('click', () => {
                localStorage.setItem('dashboard_text', textEditor.value);
                const btn = document.getElementById('textSave');
                btn.innerHTML = '<i class="fas fa-check"></i> Сохранено';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-save"></i> Сохранить';
                }, 1500);
            });

            document.getElementById('textClear').addEventListener('click', () => {
                if (confirm('Очистить текст?')) {
                    textEditor.value = '';
                    updateTextStats();
                    localStorage.removeItem('dashboard_text');
                }
            });

        })();
    </script>
