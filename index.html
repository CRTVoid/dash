<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой уголок / Дашборд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* === ЦВЕТОВЫЕ СХЕМЫ === */
        .theme-dark {
            --bg-primary: #0d0d0d;
            --bg-secondary: #121212;
            --bg-widget: #1c1c1c;
            --bg-widget-alt: #181818;
            --bg-input: #242424;
            --bg-hover: rgba(255,255,255,0.04);
            --text-primary: #e5e5e5;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border-color: rgba(255,255,255,0.04);
            --border-hover: rgba(255,255,255,0.08);
            --accent: #f97316;
            --accent-hover: #ff8c38;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-light {
            --bg-primary: #f0f0f0;
            --bg-secondary: #ffffff;
            --bg-widget: #f8f8f8;
            --bg-widget-alt: #f0f0f0;
            --bg-input: #e8e8e8;
            --bg-hover: rgba(0,0,0,0.04);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border-color: rgba(0,0,0,0.06);
            --border-hover: rgba(0,0,0,0.12);
            --accent: #e8600c;
            --accent-hover: #f97316;
            --shadow: rgba(0,0,0,0.15);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-ocean {
            --bg-primary: #0a1628;
            --bg-secondary: #0f2040;
            --bg-widget: #152b4a;
            --bg-widget-alt: #122240;
            --bg-input: #1a3355;
            --bg-hover: rgba(100,180,255,0.06);
            --text-primary: #d0e4ff;
            --text-secondary: #8ab4f8;
            --text-muted: #5a7a9a;
            --border-color: rgba(100,180,255,0.08);
            --border-hover: rgba(100,180,255,0.15);
            --accent: #4fc3ff;
            --accent-hover: #7ad0ff;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-forest {
            --bg-primary: #0a1a0a;
            --bg-secondary: #0f240f;
            --bg-widget: #163016;
            --bg-widget-alt: #122812;
            --bg-input: #1a3a1a;
            --bg-hover: rgba(100,200,100,0.06);
            --text-primary: #d4e8d4;
            --text-secondary: #7ab87a;
            --text-muted: #4a7a4a;
            --border-color: rgba(100,200,100,0.08);
            --border-hover: rgba(100,200,100,0.15);
            --accent: #66d966;
            --accent-hover: #88e888;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-sunset {
            --bg-primary: #1a0a0a;
            --bg-secondary: #2a1010;
            --bg-widget: #3a1818;
            --bg-widget-alt: #301414;
            --bg-input: #4a2020;
            --bg-hover: rgba(255,150,100,0.06);
            --text-primary: #f5d0c0;
            --text-secondary: #e89070;
            --text-muted: #9a6a5a;
            --border-color: rgba(255,150,100,0.08);
            --border-hover: rgba(255,150,100,0.15);
            --accent: #ff7f50;
            --accent-hover: #ff9a70;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-midnight {
            --bg-primary: #0a0a1a;
            --bg-secondary: #10102a;
            --bg-widget: #18183a;
            --bg-widget-alt: #141430;
            --bg-input: #20204a;
            --bg-hover: rgba(150,100,255,0.06);
            --text-primary: #d0d0f0;
            --text-secondary: #9090d0;
            --text-muted: #5a5a8a;
            --border-color: rgba(150,100,255,0.08);
            --border-hover: rgba(150,100,255,0.15);
            --accent: #a78bfa;
            --accent-hover: #c4b5fd;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-cyber {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f1a;
            --bg-widget: #1a1a2e;
            --bg-widget-alt: #14142a;
            --bg-input: #22223a;
            --bg-hover: rgba(0,255,255,0.06);
            --text-primary: #b0f0f0;
            --text-secondary: #70d0d0;
            --text-muted: #4a7a7a;
            --border-color: rgba(0,255,255,0.08);
            --border-hover: rgba(0,255,255,0.15);
            --accent: #00ffff;
            --accent-hover: #66ffff;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-rose {
            --bg-primary: #1a0a14;
            --bg-secondary: #2a0f1e;
            --bg-widget: #3a1528;
            --bg-widget-alt: #301222;
            --bg-input: #4a1a32;
            --bg-hover: rgba(255,100,150,0.06);
            --text-primary: #f0d0e0;
            --text-secondary: #d080b0;
            --text-muted: #8a5a7a;
            --border-color: rgba(255,100,150,0.08);
            --border-hover: rgba(255,100,150,0.15);
            --accent: #f472b6;
            --accent-hover: #f9a8d4;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-coffee {
            --bg-primary: #14100a;
            --bg-secondary: #1e1812;
            --bg-widget: #2a221a;
            --bg-widget-alt: #241e16;
            --bg-input: #362c22;
            --bg-hover: rgba(200,170,130,0.06);
            --text-primary: #e8ddd0;
            --text-secondary: #b0a090;
            --text-muted: #7a6a5a;
            --border-color: rgba(200,170,130,0.08);
            --border-hover: rgba(200,170,130,0.15);
            --accent: #d4a373;
            --accent-hover: #e0b88a;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-aurora {
            --bg-primary: #0a0a14;
            --bg-secondary: #0a1420;
            --bg-widget: #0f2030;
            --bg-widget-alt: #0a1a2a;
            --bg-input: #142a3a;
            --bg-hover: rgba(50,200,180,0.06);
            --text-primary: #d0f0e8;
            --text-secondary: #80d0c0;
            --text-muted: #4a8a7a;
            --border-color: rgba(50,200,180,0.08);
            --border-hover: rgba(50,200,180,0.15);
            --accent: #5eead4;
            --accent-hover: #8ff0e0;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-lavender {
            --bg-primary: #140a1a;
            --bg-secondary: #1e1028;
            --bg-widget: #2a1838;
            --bg-widget-alt: #241430;
            --bg-input: #36204a;
            --bg-hover: rgba(180,100,255,0.06);
            --text-primary: #e8d8f0;
            --text-secondary: #b090d0;
            --text-muted: #7a5a8a;
            --border-color: rgba(180,100,255,0.08);
            --border-hover: rgba(180,100,255,0.15);
            --accent: #c084fc;
            --accent-hover: #d8a8fc;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        .theme-matrix {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0a100a;
            --bg-widget: #0f1a0f;
            --bg-widget-alt: #0a160a;
            --bg-input: #142014;
            --bg-hover: rgba(0,200,0,0.06);
            --text-primary: #b0e8b0;
            --text-secondary: #60b060;
            --text-muted: #3a6a3a;
            --border-color: rgba(0,200,0,0.08);
            --border-hover: rgba(0,200,0,0.15);
            --accent: #00cc00;
            --accent-hover: #33ff33;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
            --vinyl-accent: #2a2a2a;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .dashboard {
            max-width: 1440px;
            width: 100%;
            height: 100%;
            max-height: 900px;
            display: grid;
            grid-template-columns: 1fr 1.2fr 0.8fr;
            grid-template-rows: auto 1fr 1fr;
            gap: 14px;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 25px 60px var(--shadow);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .widget {
            background: var(--bg-widget);
            border-radius: 28px;
            padding: 18px 20px 18px 20px;
            backdrop-filter: blur(2px);
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.4s ease, border-color 0.2s;
        }

        .widget:hover {
            border-color: var(--border-hover);
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .widget-header i {
            font-size: 0.9rem;
            color: var(--accent);
            width: 18px;
            transition: color 0.4s ease;
        }

        .widget-header .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
            color: var(--text-muted);
            text-transform: none;
            font-size: 0.65rem;
        }

        /* === RSS (урезан) === */
        .rss-widget {
            grid-row: 1 / 4;
            background: var(--bg-widget-alt);
            border-right: 1px solid var(--border-color);
        }

        .rss-feed {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .rss-feed::-webkit-scrollbar {
            width: 3px;
        }
        .rss-feed::-webkit-scrollbar-track {
            background: transparent;
        }
        .rss-feed::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
            opacity: 0.3;
        }

        .rss-item {
            padding: 8px 12px;
            border-radius: 12px;
            background: var(--bg-hover);
            border-left: 2px solid transparent;
            transition: all 0.15s ease;
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .rss-item:hover {
            background: var(--bg-hover);
            border-left-color: var(--accent);
        }

        .rss-item .title {
            font-weight: 500;
            font-size: 0.85rem;
            line-height: 1.3;
            color: var(--text-primary);
            text-decoration: none;
        }

        .rss-item .title a {
            color: inherit;
            text-decoration: none;
        }

        .rss-item .title a:hover {
            color: var(--accent);
        }

        .rss-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .rss-meta .source {
            background: var(--bg-widget);
            padding: 1px 8px;
            border-radius: 30px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.5rem;
            text-transform: uppercase;
        }

        .header-right .refresh-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 0.7rem;
            transition: 0.2s;
        }

        .header-right .refresh-btn:hover {
            color: var(--accent);
            transform: rotate(60deg);
        }

        /* === ПЛЕЕР === */
        .player-widget {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            background: var(--bg-widget);
        }

        .player-content {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        /* === ВИНИЛ === */
        .vinyl-container {
            flex-shrink: 0;
            width: 110px;
            height: 110px;
            position: relative;
            border-radius: 50%;
        }

        .vinyl-container svg {
            width: 100%;
            height: 100%;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
            border-radius: 50%;
        }

        .vinyl-container.playing svg {
            animation-play-state: running;
        }

        .vinyl-container.playing .vinyl-shadow {
            animation: pulseShadow 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseShadow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.08); }
        }

        .vinyl-shadow {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 70%);
            opacity: 0;
            filter: blur(20px);
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 0;
        }

        .vinyl-container.playing .vinyl-shadow {
            opacity: 0.3;
        }

        .vinyl-container svg {
            position: relative;
            z-index: 1;
        }

        .radio-info {
            flex: 1;
            min-width: 0;
        }

        .radio-info .track {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 2px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .radio-info .station {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .player-controls button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 40px;
            transition: 0.2s;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-controls button:hover {
            background: var(--bg-input);
            color: var(--accent);
        }

        .player-controls .play-btn {
            background: var(--accent);
            color: var(--bg-primary);
            width: 44px;
            height: 44px;
            font-size: 1.1rem;
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.25);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .player-controls .play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .player-controls input[type="range"] {
            width: 50px;
            background: var(--bg-input);
            height: 2px;
            border-radius: 10px;
            accent-color: var(--accent);
        }

        /* === ВЫПАДАЮЩИЙ СПИСОК СТАНЦИЙ (кастомный) === */
        .station-dropdown {
            position: relative;
            display: inline-block;
        }

        .station-dropdown-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 4px 12px 4px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.4s ease, color 0.4s ease;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-dropdown-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }

        .station-dropdown-btn i {
            font-size: 0.6rem;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .station-dropdown-btn.open i {
            transform: rotate(180deg);
        }

        .station-dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background: var(--bg-widget);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 6px 0;
            min-width: 180px;
            max-height: 260px;
            overflow-y: auto;
            box-shadow: 0 12px 40px var(--shadow);
            z-index: 100;
            display: none;
            backdrop-filter: blur(8px);
        }

        .station-dropdown-menu.open {
            display: block;
        }

        .station-dropdown-menu::-webkit-scrollbar {
            width: 3px;
        }
        .station-dropdown-menu::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        .station-dropdown-item {
            padding: 8px 16px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 2px solid transparent;
        }

        .station-dropdown-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-left-color: var(--accent);
        }

        .station-dropdown-item.active {
            color: var(--accent);
            font-weight: 600;
            border-left-color: var(--accent);
        }

        .station-dropdown-item .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
        }

        .station-dropdown-item.active .dot {
            background: var(--accent);
        }

        /* === ЧАСЫ (отдельный блок) === */
        .clock-widget {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background: var(--bg-widget-alt);
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
        }

        .clock-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .clock-time {
            font-size: 3.6rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.4s ease;
            line-height: 1.1;
        }

        .clock-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        /* === КАЛЕНДАРЬ (отдельный блок) === */
        .calendar-widget {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
            background: var(--bg-widget-alt);
            align-items: center;
            justify-content: center;
            padding: 12px 14px;
        }

        .calendar-section {
            width: 100%;
            max-width: 200px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .calendar-grid .day-name {
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 2px 0;
            letter-spacing: 0.04em;
        }

        .calendar-grid .day {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 2px 0;
            border-radius: 6px;
            transition: 0.15s;
            cursor: default;
        }

        .calendar-grid .day.weekend {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .calendar-grid .day.today {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
            box-shadow: 0 2px 12px rgba(249, 115, 22, 0.2);
        }

        .calendar-grid .day.empty {
            color: transparent;
        }

        /* === ДОСКА ДЛЯ РИСОВАНИЯ === */
        .draw-widget {
            grid-column: 2 / 4;
            grid-row: 3 / 4;
            background: var(--bg-widget);
            padding: 12px 16px 16px 16px;
        }

        .draw-area {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            cursor: crosshair;
            touch-action: none;
        }

        .draw-area canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .draw-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .draw-controls button {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .draw-controls button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .draw-controls button.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .draw-colors {
            display: flex;
            gap: 4px;
            margin-left: 4px;
        }

        .draw-colors .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .draw-colors .color-dot:hover {
            transform: scale(1.15);
        }

        .draw-colors .color-dot.active {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.2);
        }

        .draw-controls .size-control {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 4px;
        }

        .draw-controls .size-control input {
            width: 60px;
            accent-color: var(--accent);
            background: var(--bg-input);
        }

        .draw-controls .size-control span {
            font-size: 0.6rem;
            color: var(--text-muted);
            min-width: 20px;
        }

        /* === ТЕМЫ (кружочки) === */
        .theme-picker-wrapper {
            position: relative;
        }

        .theme-picker-trigger {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            background: var(--accent);
        }

        .theme-picker-trigger:hover {
            transform: scale(1.1);
            border-color: var(--border-hover);
        }

        .theme-picker-popup {
            position: absolute;
            bottom: calc(100% + 8px);
            right: 0;
            background: var(--bg-widget);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 10px 14px;
            box-shadow: 0 12px 40px var(--shadow);
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 180px;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .theme-picker-popup.open {
            display: flex;
        }

        .theme-picker-popup .theme-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .theme-picker-popup .theme-dot:hover {
            transform: scale(1.15);
        }

        .theme-picker-popup .theme-dot.active {
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(249, 115, 22, 0.3);
        }

        /* === ЗАМЕТКИ (убраны, вместо них доска) === */

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto auto auto;
                gap: 12px;
                padding: 16px;
                max-height: none;
                height: auto;
            }
            .rss-widget { grid-row: 1 / 5; }
            .player-widget { grid-column: 2 / 3; grid-row: 1 / 2; }
            .clock-widget { grid-column: 2 / 3; grid-row: 2 / 3; }
            .calendar-widget { grid-column: 2 / 3; grid-row: 3 / 4; }
            .draw-widget { grid-column: 1 / 3; grid-row: 4 / 5; min-height: 200px; }
            .clock-time { font-size: 2.8rem; }
            .vinyl-container { width: 80px; height: 80px; }
        }

        @media (max-width: 700px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto auto auto;
                padding: 12px;
                gap: 10px;
                border-radius: 24px;
            }
            .rss-widget { grid-row: auto; max-height: 250px; }
            .player-widget { grid-column: 1 / 2; grid-row: auto; }
            .clock-widget { grid-column: 1 / 2; grid-row: auto; }
            .calendar-widget { grid-column: 1 / 2; grid-row: auto; }
            .draw-widget { grid-column: 1 / 2; grid-row: auto; min-height: 180px; }
            .clock-time { font-size: 2.4rem; }
            .vinyl-container { width: 70px; height: 70px; }
            .station-dropdown-btn { max-width: 100px; font-size: 0.6rem; }
            .calendar-section { max-width: 100%; }
        }

        @media (max-width: 400px) {
            body { padding: 8px; }
            .dashboard { padding: 8px; gap: 8px; border-radius: 16px; }
            .widget { padding: 10px 12px; border-radius: 16px; }
            .clock-time { font-size: 1.8rem; }
            .player-controls button { width: 28px; height: 28px; font-size: 0.8rem; }
            .player-controls .play-btn { width: 36px; height: 36px; font-size: 0.9rem; }
            .vinyl-container { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<div class="dashboard">

    <!-- === RSS === -->
    <div class="widget rss-widget">

    <!-- === ПЛЕЕР === -->
    <div class="widget player-widget">
        <div class="widget-header">

            <span>Радио</span>
            <div class="header-right">
                <!-- Кастомный дропдаун станций -->
                <div class="station-dropdown" id="stationDropdown">
                    <button class="station-dropdown-btn" id="stationDropdownBtn">

                <!-- Выбор темы кружочком -->
                <div class="theme-picker-wrapper">

        <div class="player-content">

                    <circle cx="60" cy="60" r="31" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.2"/>

                    <circle cx="60" cy="60" r="22" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                    <!-- Блик 1 (14:00) -->
                    <circle cx="60" cy="60" r="56" fill="url(#shine1)"/>

                    <circle cx="60" cy="60" r="4" fill="var(--bg-primary)"/>

                    <text x="60" y="53" font-size="5" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="700" letter-spacing="0.5">S</text>

                </svg>
            </div>
            <div class="radio-info">
                <div class="track" id="trackName">Groove Salad</div>
                <div class="station" id="stationName">SomaFM · Chillout</div>
                <div class="player-controls">

    <!-- === ЧАСЫ === -->

                <div class="color-dot" style="background:#f97316;" data-color="#f97316"></div>
                <div class="color-dot" style="background:#4fc3ff;" data-color="#4fc3ff"></div>
                <div class="color-dot" style="background:#66d966;" data-color="#66d966"></div>
                <div class="color-dot" style="background:#f472b6;" data-color="#f472b6"></div>
                <div class="color-dot" style="background:#a78bfa;" data-color="#a78bfa"></div>
                <div class="color-dot" style="background:#ff7f50;" data-color="#ff7f50"></div>
            </div>

<script>
    (function() {
        'use strict';

        // === СПИСОК РАДИОСТАНЦИЙ ===
        const stations = [
            { value: 'https://ice1.somafm.com/groovesalad-128-mp3', track: 'Groove Salad', station: 'SomaFM · Chillout' },
            { value: 'https://ice1.somafm.com/darkzone-128-mp3', track: 'The Dark Zone', station: 'SomaFM · Ambient' },
            { value: 'https://ice1.somafm.com/defcon-128-mp3', track: 'Def Con Radio', station: 'SomaFM · Dark Ambient' },
            { value: 'https://ice1.somafm.com/metal-128-mp3', track: 'Metal Detector', station: 'SomaFM · Heavy Metal' },
            { value: 'https://ice1.somafm.com/lc70s-128-mp3', track: 'Left Coast 70s', station: 'SomaFM · 70s Hits' },
            { value: 'https://ice1.somafm.com/u80s-128-mp3', track: 'Underground 80s', station: 'SomaFM · 80s Underground' },
            { value: 'https://ice1.somafm.com/7soul-128-mp3', track: 'Seven Inch Soul', station: 'SomaFM · Soul Classics' },
            { value: 'https://ice1.somafm.com/insound-128-mp3', track: 'The In-Sound', station: 'SomaFM · 60s Garage' },
            { value: 'https://ice1.somafm.com/covers-128-mp3', track: 'Covers', station: 'SomaFM · Cover Versions' },
            { value: 'https://ice1.somafm.com/sf1033-128-mp3', track: 'SF 10-33', station: 'SomaFM · Police Radio' },
            { value: 'https://ice1.somafm.com/scanner-128-mp3', track: 'SF Police Scanner', station: 'SomaFM · Live Scanner' },
            { value: 'https://ice1.somafm.com/sfinsf-128-mp3', track: 'SF in SF', station: 'SomaFM · Live in SF' },
            { value: 'https://ice1.somafm.com/vaporwaves-128-mp3', track: 'Vaporvawes', station: 'SomaFM · Vaporwave' },
            { value: 'https://ice1.somafm.com/doomed-128-mp3', track: 'Doomed', station: 'SomaFM · Doom Metal' },
            { value: 'https://ice1.somafm.com/beatblender-128-mp3', track: 'Beat Blender', station: 'SomaFM · Deep House' },
        ];

        let currentStationIndex = 0;

        // === КАСТОМНЫЙ ДРОПДАУН СТАНЦИЙ ===
        const dropdownBtn = document.getElementById('stationDropdownBtn');
        const dropdownMenu = document.getElementById('stationDropdownMenu');
        const currentStationLabel = document.getElementById('currentStationLabel');

        function renderStationDropdown() {
            let html = '';
            stations.forEach((s, i) => {
                html += `
                    <div class="station-dropdown-item ${i === currentStationIndex ? 'active' : ''}" data-index="${i}">
                        <span class="dot"></span>
                        ${s.track}
                    </div>
                `;
            });
            dropdownMenu.innerHTML = html;

            dropdownMenu.querySelectorAll('.station-dropdown-item').forEach(item => {
                item.addEventListener('click', () => {
                    const idx = parseInt(item.dataset.index, 10);
                    selectStation(idx);
                    dropdownMenu.classList.remove('open');
                    dropdownBtn.classList.remove('open');
                });
            });
        }

        function selectStation(index) {
            currentStationIndex = index;
            const s = stations[index];
            currentStationLabel.textContent = s.track;
            updateStationInfo(index);
            // Если играет — переключаем
            if (audio.src && !audio.paused) {
                playRadio(index);
            }
            renderStationDropdown();
        }

        dropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('open');
            dropdownBtn.classList.toggle('open');
        });

        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('open');
            dropdownBtn.classList.remove('open');
        });

        // === ТЕМЫ (кружочки) ===
        const themes = [
            { id: 'theme-dark', color: '#1a1a1a' },
            { id: 'theme-light', color: '#e8e8e8' },
            { id: 'theme-ocean', color: '#1a3a6a' },
            { id: 'theme-forest', color: '#1a3a1a' },
            { id: 'theme-sunset', color: '#6a2a1a' },
            { id: 'theme-midnight', color: '#2a1a4a' },
            { id: 'theme-cyber', color: '#1a3a3a' },
            { id: 'theme-rose', color: '#4a1a2a' },
            { id: 'theme-coffee', color: '#3a2a1a' },
            { id: 'theme-aurora', color: '#1a3a4a' },
            { id: 'theme-lavender', color: '#3a1a4a' },
            { id: 'theme-matrix', color: '#1a3a1a' },
        ];

        const themeTrigger = document.getElementById('themePickerTrigger');
        const themePopup = document.getElementById('themePickerPopup');
        const body = document.body;

        function renderThemePicker() {
            let html = '';
            themes.forEach(t => {
                const isActive = body.className === t.id;
                html += `
                    <div class="theme-dot ${isActive ? 'active' : ''}" 
                         style="background:${t.color};" 
                         data-theme="${t.id}"
                         title="${t.id.replace('theme-', '')}">
                    </div>
                `;
            });
            themePopup.innerHTML = html;

            // Обновляем цвет триггера
            const activeTheme = themes.find(t => t.id === body.className);
            if (activeTheme) {
                themeTrigger.style.background = activeTheme.color;
            }

            themePopup.querySelectorAll('.theme-dot').forEach(dot => {
                dot.addEventListener('click', () => {
                    setTheme(dot.dataset.theme);
                    themePopup.classList.remove('open');
                });
            });
        }

        function setTheme(themeName) {
            body.className = themeName;
            localStorage.setItem('dashboard_theme', themeName);
            renderThemePicker();
        }

        themeTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            themePopup.classList.toggle('open');
        });

        document.addEventListener('click', () => {
            themePopup.classList.remove('open');
        });

        const savedTheme = localStorage.getItem('dashboard_theme');
        if (savedTheme && themes.some(t => t.id === savedTheme)) {
            setTheme(savedTheme);
        } else {
            setTheme('theme-dark');
        }

        // === ЧАСЫ ===
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockTime').textContent = `${hours}:${minutes}:${seconds}`;
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('clockDate').textContent = now.toLocaleDateString('ru-RU', options);
        }
        updateClock();
        setInterval(updateClock, 1000);

        // === КАЛЕНДАРЬ ===
        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const today = now.getDate();

            document.getElementById('calendarMonth').textContent = now.toLocaleDateString('ru-RU', { month: 'long' });
            document.getElementById('calendarYear').textContent = year;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            let html = '';
            const dayNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            dayNames.forEach(name => {
                html += `<div class="day-name">${name}</div>`;
            });

            let startOffset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = startOffset - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="day empty">${day}</div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
                const isToday = d === today ? 'today' : '';
                const weekendClass = isWeekend ? 'weekend' : '';
                html += `<div class="day ${isToday} ${weekendClass}">${d}</div>`;
            }

            const totalCells = startOffset + daysInMonth;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let d = 1; d <= remaining; d++) {
                html += `<div class="day empty">${d}</div>`;
            }

            document.getElementById('calendarGrid').innerHTML = html;
        }
        renderCalendar();

        // === RSS ===
        const RSS_FEEDS = [
            { name: 'Meduza', url: 'https://meduza.io/rss/all' },
            { name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
            { name: 'BBC Russian', url: 'http://feeds.bbci.co.uk/russian/news/rss.xml' },
        ];

        const rssFeedContainer = document.getElementById('rssFeed');

        async function fetchRSS() {
            try {
                let allItems = [];

                for (const feed of RSS_FEEDS) {
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(feed.url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) continue;
                    const xmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                    const items = xmlDoc.querySelectorAll('item');
                    
                    items.forEach(item => {
                        const title = item.querySelector('title')?.textContent?.trim() || 'Без заголовка';
                        const link = item.querySelector('link')?.textContent?.trim() || '#';
                        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
                        allItems.push({
                            title: title,
                            link: link,
                            source: feed.name,
                            date: pubDate,
                        });
                    });
                }

                allItems.sort((a, b) => {
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    if (isNaN(dateA) || isNaN(dateB)) return 0;
                    return dateB - dateA;
                });

                allItems = allItems.slice(0, 25);

                if (allItems.length === 0) {
                    rssFeedContainer.innerHTML = `
                        <div style="padding:20px 0; text-align:center; color:var(--text-muted); font-size:0.8rem;">
                            <i class="fas fa-newspaper" style="color:var(--accent);"></i><br><br>Нет новостей
                        </div>
                    `;
                    return;
                }

                let html = '';
                allItems.forEach(item => {
                    const title = item.title.length > 100 ? item.title.slice(0, 100) + '…' : item.title;
                    const dateStr = item.date ? new Date(item.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'}) : '';
                    html += `
                        <div class="rss-item">
                            <div class="title"><a href="${item.link}" target="_blank" rel="noopener">${title}</a></div>
                            <div class="rss-meta">
                                <span class="source">${item.source}</span>
                                ${dateStr ? `<span>${dateStr}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                rssFeedContainer.innerHTML = html;
            } catch (error) {
                console.warn('RSS error:', error);
                rssFeedContainer.innerHTML = `
                    <div style="padding:20px 0; text-align:center; color:var(--text-muted); font-size:0.8rem;">
                        <i class="fas fa-exclamation-triangle" style="color:var(--accent);"></i><br><br>Ошибка загрузки
                    </div>
                `;
            }
        }

        fetchRSS();
        setInterval(fetchRSS, 600000);

        document.getElementById('refreshRssBtn').addEventListener('click', () => {
            const btn = document.getElementById('refreshRssBtn');
            btn.style.transform = 'rotate(360deg)';
            fetchRSS().finally(() => {
                setTimeout(() => { btn.style.transform = ''; }, 300);
            });
        });

        // === РАДИО ===
        const audio = new Audio();
        audio.volume = 0.7;

        const vinylContainer = document.getElementById('vinylContainer');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const trackName = document.getElementById('trackName');
        const stationName = document.getElementById('stationName');
        const volumeSlider = document.getElementById('volumeSlider');

        function updateStationInfo(index) {
            const s = stations[index];
            trackName.textContent = s.track;
            stationName.textContent = s.station;
            currentStationLabel.textContent = s.track;
            renderStationDropdown();
        }

        function playRadio(index) {
            const url = stations[index].value;
            if (audio.src !== url) {
                audio.src = url;
                audio.load();
            }
            audio.play().catch(e => console.warn('Play error:', e));
            vinylContainer.classList.add('playing');
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            updateStationInfo(index);
            currentStationIndex = index;
        }

        function pauseRadio() {
            audio.pause();
            vinylContainer.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }

        function stopRadio() {
            audio.pause();
            audio.currentTime = 0;
            audio.src = '';
            vinylContainer.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            trackName.textContent = 'Выберите станцию';
            stationName.textContent = 'Нажмите Play';
        }

        playBtn.addEventListener('click', () => {
            if (audio.src && !audio.paused) {
                pauseRadio();
            } else {
                playRadio(currentStationIndex);
            }
        });

        stopBtn.addEventListener('click', stopRadio);

        prevBtn.addEventListener('click', () => {
            const newIndex = (currentStationIndex - 1 + stations.length) % stations.length;
            if (audio.src && !audio.paused) {
                playRadio(newIndex);
            } else {
                currentStationIndex = newIndex;
                updateStationInfo(newIndex);
            }
        });

        nextBtn.addEventListener('click', () => {
            const newIndex = (currentStationIndex + 1) % stations.length;
            if (audio.src && !audio.paused) {
                playRadio(newIndex);
            } else {
                currentStationIndex = newIndex;
                updateStationInfo(newIndex);
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        renderStationDropdown();
        updateStationInfo(0);

        // === ДОСКА ДЛЯ РИСОВАНИЯ ===
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const drawArea = document.getElementById('drawArea');
        let isDrawing = false;
        let drawColor = '#ffffff';
        let drawSize = 3;
        let history = [];
        let historyIndex = -1;
        let currentPath = [];

        function resizeCanvas() {
            const rect = drawArea.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            restoreFromHistory();
        }

        function saveToHistory() {
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            history.push(canvas.toDataURL());
            historyIndex = history.length - 1;
            if (history.length > 50) {
                history.shift();
                historyIndex--;
            }
        }

        function restoreFromHistory() {
            if (historyIndex >= 0 && history[historyIndex]) {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[historyIndex];
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            currentPath = [pos];
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getPos(e);
            currentPath.push(pos);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = drawColor;
            ctx.lineWidth = drawSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.beginPath();
            if (currentPath.length > 1) {
                saveToHistory();
            }
            currentPath = [];
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);

        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', endDraw, { passive: false });

        // Цвета
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                drawColor = dot.dataset.color;
            });
        });

        // Размер
        const drawSizeInput = document.getElementById('drawSize');
        const drawSizeLabel = document.getElementById('drawSizeLabel');
        drawSizeInput.addEventListener('input', () => {
            drawSize = parseInt(drawSizeInput.value);
            drawSizeLabel.textContent = drawSize;
        });

        // Очистить
        document.getElementById('drawClear').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            saveToHistory();
        });

        // Отменить
        document.getElementById('drawUndo').addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                restoreFromHistory();
            }
        });

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        saveToHistory();

        // Стартовый холст
        setTimeout(() => {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveToHistory();
        }, 100);

    })();
</script>

</body>
</html>
