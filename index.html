<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой уголок / Дашборд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* === ЦВЕТОВЫЕ СХЕМЫ === */
        .theme-dark {
            --bg-primary: #0d0d0d;
            --bg-secondary: #121212;
            --bg-widget: #1c1c1c;
            --bg-widget-alt: #181818;
            --bg-input: #242424;
            --text-primary: #e5e5e5;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border-color: rgba(255,255,255,0.04);
            --border-hover: rgba(255,255,255,0.08);
            --accent: #f97316;
            --accent-hover: #ff8c38;
            --shadow: rgba(0,0,0,0.8);
        }

        .theme-light {
            --bg-primary: #f0f0f0;
            --bg-secondary: #ffffff;
            --bg-widget: #f8f8f8;
            --bg-widget-alt: #f0f0f0;
            --bg-input: #e8e8e8;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border-color: rgba(0,0,0,0.06);
            --border-hover: rgba(0,0,0,0.12);
            --accent: #e8600c;
            --accent-hover: #f97316;
            --shadow: rgba(0,0,0,0.15);
        }

        .theme-ocean {
            --bg-primary: #0a1628;
            --bg-secondary: #0f2040;
            --bg-widget: #152b4a;
            --bg-widget-alt: #122240;
            --bg-input: #1a3355;
            --text-primary: #d0e4ff;
            --text-secondary: #8ab4f8;
            --text-muted: #5a7a9a;
            --border-color: rgba(100,180,255,0.08);
            --border-hover: rgba(100,180,255,0.15);
            --accent: #4fc3ff;
            --accent-hover: #7ad0ff;
            --shadow: rgba(0,0,0,0.7);
        }

        .theme-forest {
            --bg-primary: #0a1a0a;
            --bg-secondary: #0f240f;
            --bg-widget: #163016;
            --bg-widget-alt: #122812;
            --bg-input: #1a3a1a;
            --text-primary: #d4e8d4;
            --text-secondary: #7ab87a;
            --text-muted: #4a7a4a;
            --border-color: rgba(100,200,100,0.08);
            --border-hover: rgba(100,200,100,0.15);
            --accent: #66d966;
            --accent-hover: #88e888;
            --shadow: rgba(0,0,0,0.7);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .dashboard {
            max-width: 1440px;
            width: 100%;
            height: 100%;
            max-height: 900px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            grid-template-rows: auto 1fr 1fr;
            gap: 16px;
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 40px;
            box-shadow: 0 25px 60px var(--shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* === ВИДЖЕТЫ === */
        .widget {
            background: var(--bg-widget);
            border-radius: 28px;
            padding: 20px 24px 20px 24px;
            backdrop-filter: blur(2px);
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.2s;
        }

        .widget:hover {
            border-color: var(--border-hover);
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-shrink: 0;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .widget-header i {
            font-size: 1rem;
            color: var(--accent);
            width: 20px;
            transition: color 0.3s ease;
        }

        .widget-header .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 400;
            color: var(--text-muted);
            text-transform: none;
            font-size: 0.7rem;
        }

        .widget-header .header-right .refresh-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .widget-header .header-right .refresh-btn:hover {
            color: var(--accent);
            background: rgba(255,255,255,0.05);
            transform: rotate(60deg);
        }

        /* === RSS === */
        .rss-widget {
            grid-row: 1 / 4;
            background: var(--bg-widget-alt);
            border-right: 1px solid var(--border-color);
        }

        .rss-feed {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .rss-feed::-webkit-scrollbar {
            width: 4px;
        }
        .rss-feed::-webkit-scrollbar-track {
            background: transparent;
        }
        .rss-feed::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
            opacity: 0.3;
        }

        .rss-item {
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid transparent;
            transition: all 0.15s ease;
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .rss-item:hover {
            background: rgba(255,255,255,0.04);
            border-left-color: var(--accent);
        }

        .rss-item .title {
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text-primary);
            text-decoration: none;
        }

        .rss-item .title a {
            color: inherit;
            text-decoration: none;
        }

        .rss-item .title a:hover {
            color: var(--accent);
        }

        .rss-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .rss-meta .source {
            background: var(--bg-widget);
            padding: 2px 10px;
            border-radius: 40px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.55rem;
            text-transform: uppercase;
        }

        /* === ПЛЕЕР === */
        .player-widget {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            background: var(--bg-widget);
        }

        .player-content {
            display: flex;
            align-items: center;
            gap: 24px;
            flex: 1;
        }

        /* === SVG ВИНИЛ === */
        .vinyl-container {
            flex-shrink: 0;
            width: 90px;
            height: 90px;
            position: relative;
        }

        .vinyl-container svg {
            width: 100%;
            height: 100%;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
        }

        .vinyl-container.playing svg {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Метка центра винила */
        .vinyl-label {
            fill: var(--accent);
            transition: fill 0.3s ease;
        }

        .radio-info {
            flex: 1;
        }

        .radio-info .track {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .radio-info .station {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
        }

        .player-controls button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 40px;
            transition: 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-controls button:hover {
            background: var(--bg-input);
            color: var(--accent);
        }

        .player-controls .play-btn {
            background: var(--accent);
            color: var(--bg-primary);
            width: 48px;
            height: 48px;
            font-size: 1.2rem;
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.25);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .player-controls .play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .station-select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            max-width: 180px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .station-select option {
            background: var(--bg-widget);
            color: var(--text-primary);
        }

        /* === ЧАСЫ === */
        .clock-widget {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background: var(--bg-widget-alt);
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
        }

        .clock-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .clock-time {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.3s ease;
        }

        .clock-seconds {
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--accent);
            opacity: 0.8;
            transition: color 0.3s ease;
        }

        .clock-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-left: 8px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* === ЗАМЕТКИ === */
        .notes-widget {
            grid-column: 2 / 3;
            grid-row: 3 / 4;
            background: var(--bg-widget);
        }

        .notes-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
            min-height: 0;
        }

        .notes-list::-webkit-scrollbar {
            width: 3px;
        }
        .notes-list::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
            opacity: 0.3;
        }

        .note-item {
            background: var(--bg-input);
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            border: 1px solid transparent;
            transition: 0.15s;
        }

        .note-item:hover {
            border-color: var(--border-hover);
        }

        .note-item .note-text {
            word-break: break-word;
            flex: 1;
        }

        .note-item .delete-note {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
            opacity: 0;
            flex-shrink: 0;
        }

        .note-item:hover .delete-note {
            opacity: 1;
        }

        .note-item .delete-note:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .notes-input-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .notes-input-row input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            transition: 0.2s;
        }

        .notes-input-row input:focus {
            border-color: var(--accent);
            background: var(--bg-input);
        }

        .notes-input-row input::placeholder {
            color: var(--text-muted);
        }

        .notes-input-row button {
            background: var(--accent);
            border: none;
            border-radius: 40px;
            padding: 0 18px;
            font-weight: 600;
            color: var(--bg-primary);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .notes-input-row button:hover {
            background: var(--accent-hover);
            transform: scale(0.97);
        }

        .notes-counter {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
            letter-spacing: 0.03em;
        }

        /* === ПЕРЕКЛЮЧАТЕЛЬ ТЕМ === */
        .theme-switcher {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .theme-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .theme-dot:hover {
            transform: scale(1.15);
        }

        .theme-dot.active {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.3);
        }

        .theme-dot-dark { background: #1a1a1a; border-color: #444; }
        .theme-dot-light { background: #e8e8e8; border-color: #bbb; }
        .theme-dot-ocean { background: #1a3a6a; border-color: #4a8aba; }
        .theme-dot-forest { background: #1a3a1a; border-color: #4a8a4a; }

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr 1.5fr;
                gap: 14px;
                padding: 18px;
            }
            .clock-time { font-size: 3.2rem; }
            .clock-seconds { font-size: 1.4rem; }
        }

        @media (max-width: 820px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
                max-height: none;
                height: auto;
                padding: 14px;
                gap: 14px;
                border-radius: 28px;
            }
            .rss-widget {
                grid-row: auto;
                max-height: 350px;
            }
            .player-widget {
                grid-column: 1 / 2;
                grid-row: auto;
                min-height: 180px;
            }
            .clock-widget {
                grid-column: 1 / 2;
                grid-row: auto;
                min-height: 100px;
            }
            .notes-widget {
                grid-column: 1 / 2;
                grid-row: auto;
                min-height: 250px;
            }
            .clock-time { font-size: 2.8rem; }
            .clock-seconds { font-size: 1.2rem; }
            .vinyl-container {
                width: 70px;
                height: 70px;
            }
            .station-select { max-width: 140px; font-size: 0.65rem; }
        }

        @media (max-width: 500px) {
            body { padding: 10px; }
            .dashboard { padding: 10px; border-radius: 20px; gap: 10px; }
            .widget { padding: 14px 16px; }
            .player-content { flex-wrap: wrap; gap: 12px; }
            .station-select { max-width: 120px; font-size: 0.6rem; }
            .clock-time { font-size: 2.2rem; }
            .clock-seconds { font-size: 1rem; }
            .rss-widget { max-height: 280px; }
        }
    </style>
</head>
<body>

<div class="dashboard">

    <!-- === RSS === -->
    <div class="widget rss-widget">
        <div class="widget-header">
            <i class="fas fa-rss"></i>
            <span>Новостная лента</span>
            <div class="header-right">
                <span><i class="fas fa-circle" style="color: #22c55e; font-size: 0.4rem; vertical-align: middle;"></i> обновлено</span>
                <button class="refresh-btn" id="refreshRssBtn" title="Обновить ленту">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
        <div class="rss-feed" id="rssFeed">
            <div style="text-align:center; padding: 40px 0; color: var(--text-muted); font-size: 0.9rem;">
                <i class="fas fa-spinner fa-pulse" style="font-size: 1.4rem; color: var(--accent);"></i><br><br>Загружаю ленту...
            </div>
        </div>
    </div>

    <!-- === ПЛЕЕР === -->
    <div class="widget player-widget">
        <div class="widget-header">
            <i class="fas fa-headphones"></i>
            <span>Радио / Плеер</span>
            <div class="header-right">
                <select class="station-select" id="stationSelect">
                    <option value="https://ice1.somafm.com/groovesalad-128-mp3" selected>Groove Salad (Chill)</option>
                    <option value="https://ice1.somafm.com/darkzone-128-mp3">The Dark Zone</option>
                    <option value="https://ice1.somafm.com/defcon-128-mp3">Def Con Radio</option>
                    <option value="https://ice1.somafm.com/metal-128-mp3">Metal Detector</option>
                    <option value="https://ice1.somafm.com/lc70s-128-mp3">Left Coast 70s</option>
                    <option value="https://ice1.somafm.com/u80s-128-mp3">Underground 80s</option>
                    <option value="https://ice1.somafm.com/7soul-128-mp3">Seven Inch Soul</option>
                    <option value="https://ice1.somafm.com/insound-128-mp3">The In-Sound</option>
                    <option value="https://ice1.somafm.com/covers-128-mp3">Covers</option>
                    <option value="https://ice1.somafm.com/sf1033-128-mp3">SF 10-33</option>
                    <option value="https://ice1.somafm.com/scanner-128-mp3">SF Police Scanner</option>
                    <option value="https://ice1.somafm.com/sfinsf-128-mp3">SF in SF</option>
                    <option value="https://ice1.somafm.com/vaporwaves-128-mp3">Vaporvawes</option>
                    <option value="https://ice1.somafm.com/doomed-128-mp3">Doomed</option>
                    <option value="https://ice1.somafm.com/beatblender-128-mp3">Beat Blender</option>
                </select>
                <div class="theme-switcher">
                    <div class="theme-dot theme-dot-dark active" data-theme="theme-dark" title="Тёмная"></div>
                    <div class="theme-dot theme-dot-light" data-theme="theme-light" title="Светлая"></div>
                    <div class="theme-dot theme-dot-ocean" data-theme="theme-ocean" title="Океан"></div>
                    <div class="theme-dot theme-dot-forest" data-theme="theme-forest" title="Лес"></div>
                </div>
            </div>
        </div>

        <div class="player-content">
            <div class="vinyl-container" id="vinylContainer">
                <svg viewBox="0 0 100 100">
                    <!-- Винил с реалистичными деталями -->
                    <defs>
                        <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#2a2a2a"/>
                            <stop offset="30%" stop-color="#1a1a1a"/>
                            <stop offset="70%" stop-color="#0d0d0d"/>
                            <stop offset="100%" stop-color="#050505"/>
                        </radialGradient>
                        <radialGradient id="shineGrad" cx="35%" cy="35%" r="60%">
                            <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
                            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                        </radialGradient>
                    </defs>
                    <!-- Тёмный диск -->
                    <circle cx="50" cy="50" r="45" fill="url(#vinylGrad)" stroke="#333" stroke-width="0.5"/>
                    <!-- Блик -->
                    <circle cx="50" cy="50" r="45" fill="url(#shineGrad)"/>
                    <!-- Бороздки (концентрические круги) -->
                    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.3"/>
                    <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                    <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.3"/>
                    <circle cx="50" cy="50" r="26" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
                    <circle cx="50" cy="50" r="22" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.3"/>
                    <!-- Центральная этикетка -->
                    <circle cx="50" cy="50" r="14" fill="var(--accent)" opacity="0.9" class="vinyl-label"/>
                    <circle cx="50" cy="50" r="11" fill="var(--bg-secondary)" opacity="0.15"/>
                    <circle cx="50" cy="50" r="4" fill="#222" stroke="#444" stroke-width="0.5"/>
                    <circle cx="50" cy="50" r="2.5" fill="#111"/>
                    <!-- Текст на этикетке (микро) -->
                    <text x="50" y="45" font-size="3.5" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="700" letter-spacing="0.5">S</text>
                    <text x="50" y="52" font-size="2.8" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="300">FM</text>
                </svg>
            </div>
            <div class="radio-info">
                <div class="track" id="trackName">Groove Salad</div>
                <div class="station" id="stationName">SomaFM · Chillout</div>
                <div class="player-controls">
                    <button id="playBtn" class="play-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="stopBtn">
                        <i class="fas fa-stop"></i>
                    </button>
                    <div style="display: flex; align-items: center; gap: 8px; margin-left: 4px;">
                        <i class="fas fa-volume-low" style="color: var(--text-muted); font-size: 0.8rem;"></i>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7" 
                               style="width: 70px; background: var(--bg-input); height: 3px; border-radius: 10px; accent-color: var(--accent);">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- === ЧАСЫ === -->
    <div class="widget clock-widget">
        <div class="widget-header" style="margin-bottom: 4px;">
            <i class="fas fa-clock"></i>
            <span>Текущее время</span>
        </div>
        <div class="clock-display">
            <span class="clock-time" id="clockTime">00:00</span>
            <span class="clock-seconds" id="clockSeconds">00</span>
            <span class="clock-date" id="clockDate">1 января 2026</span>
        </div>
    </div>

    <!-- === ЗАМЕТКИ === -->
    <div class="widget notes-widget">
        <div class="widget-header">
            <i class="fas fa-pencil-alt"></i>
            <span>Быстрые заметки</span>
            <div class="header-right">
                <span><i class="far fa-save"></i> автосохранение</span>
            </div>
        </div>
        <div class="notes-area">
            <div class="notes-list" id="notesList"></div>
            <div class="notes-input-row">
                <input type="text" id="noteInput" placeholder="Напишите мысль и нажмите Enter..." maxlength="200">
                <button id="addNoteBtn"><i class="fas fa-plus"></i> Добавить</button>
            </div>
            <div class="notes-counter" id="notesCounter">0 заметок</div>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // === ПЕРЕКЛЮЧАТЕЛЬ ТЕМ ===
        const themeDots = document.querySelectorAll('.theme-dot');
        const body = document.body;

        function setTheme(themeName) {
            body.className = themeName;
            themeDots.forEach(dot => {
                dot.classList.toggle('active', dot.dataset.theme === themeName);
            });
            localStorage.setItem('dashboard_theme', themeName);
        }

        themeDots.forEach(dot => {
            dot.addEventListener('click', () => {
                setTheme(dot.dataset.theme);
            });
        });

        // Восстанавливаем тему
        const savedTheme = localStorage.getItem('dashboard_theme');
        if (savedTheme && document.querySelector(`[data-theme="${savedTheme}"]`)) {
            setTheme(savedTheme);
        } else {
            setTheme('theme-dark');
        }

        // === ЧАСЫ ===
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockTime').textContent = `${hours}:${minutes}`;
            document.getElementById('clockSeconds').textContent = seconds;
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('clockDate').textContent = now.toLocaleDateString('ru-RU', options);
        }
        updateClock();
        setInterval(updateClock, 1000);

        // === RSS ===
        const RSS_FEEDS = [
            { name: 'Meduza', url: 'https://meduza.io/rss/all' },
            { name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
            { name: 'BBC Russian', url: 'http://feeds.bbci.co.uk/russian/news/rss.xml' },
        ];

        const rssFeedContainer = document.getElementById('rssFeed');

        async function fetchRSS() {
            try {
                let allItems = [];

                for (const feed of RSS_FEEDS) {
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(feed.url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) continue;
                    const xmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                    const items = xmlDoc.querySelectorAll('item');
                    
                    items.forEach(item => {
                        const title = item.querySelector('title')?.textContent?.trim() || 'Без заголовка';
                        const link = item.querySelector('link')?.textContent?.trim() || '#';
                        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
                        allItems.push({
                            title: title,
                            link: link,
                            source: feed.name,
                            date: pubDate,
                        });
                    });
                }

                allItems.sort((a, b) => {
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    if (isNaN(dateA) || isNaN(dateB)) return 0;
                    return dateB - dateA;
                });

                allItems = allItems.slice(0, 30);

                if (allItems.length === 0) {
                    rssFeedContainer.innerHTML = `
                        <div style="padding: 30px 0; text-align:center; color: var(--text-muted); font-size:0.9rem;">
                            <i class="fas fa-newspaper" style="color: var(--accent);"></i><br><br>
                            Новостей пока нет<br>
                            <span style="font-size:0.8rem; opacity:0.6;">попробуйте обновить</span>
                        </div>
                    `;
                    return;
                }

                let html = '';
                allItems.forEach(item => {
                    const title = item.title.length > 120 ? item.title.slice(0, 120) + '…' : item.title;
                    const dateStr = item.date ? new Date(item.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'}) : '';
                    html += `
                        <div class="rss-item">
                            <div class="title"><a href="${item.link}" target="_blank" rel="noopener">${title}</a></div>
                            <div class="rss-meta">
                                <span class="source">${item.source}</span>
                                ${dateStr ? `<span class="date">${dateStr}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                rssFeedContainer.innerHTML = html;
            } catch (error) {
                console.warn('RSS load error:', error);
                rssFeedContainer.innerHTML = `
                    <div style="padding: 30px 0; text-align:center; color: var(--text-muted); font-size:0.9rem;">
                        <i class="fas fa-exclamation-triangle" style="color: var(--accent);"></i><br><br>
                        Не удалось загрузить ленту<br>
                        <span style="font-size:0.8rem; opacity:0.6;">проверьте интернет-соединение</span>
                    </div>
                `;
            }
        }

        fetchRSS();
        const rssInterval = setInterval(fetchRSS, 600000);

        // Кнопка обновления
        document.getElementById('refreshRssBtn').addEventListener('click', () => {
            const btn = document.getElementById('refreshRssBtn');
            btn.style.transform = 'rotate(360deg)';
            fetchRSS().finally(() => {
                setTimeout(() => { btn.style.transform = ''; }, 300);
            });
        });

        // === РАДИО ===
        const audio = new Audio();
        audio.volume = 0.7;

        const vinylContainer = document.getElementById('vinylContainer');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const stationSelect = document.getElementById('stationSelect');
        const trackName = document.getElementById('trackName');
        const stationName = document.getElementById('stationName');
        const volumeSlider = document.getElementById('volumeSlider');

        const stationNames = {
            'https://ice1.somafm.com/groovesalad-128-mp3': { track: 'Groove Salad', station: 'SomaFM · Chillout' },
            'https://ice1.somafm.com/darkzone-128-mp3': { track: 'The Dark Zone', station: 'SomaFM · Ambient' },
            'https://ice1.somafm.com/defcon-128-mp3': { track: 'Def Con Radio', station: 'SomaFM · Dark Ambient' },
            'https://ice1.somafm.com/metal-128-mp3': { track: 'Metal Detector', station: 'SomaFM · Heavy Metal' },
            'https://ice1.somafm.com/lc70s-128-mp3': { track: 'Left Coast 70s', station: 'SomaFM · 70s Hits' },
            'https://ice1.somafm.com/u80s-128-mp3': { track: 'Underground 80s', station: 'SomaFM · 80s Underground' },
            'https://ice1.somafm.com/7soul-128-mp3': { track: 'Seven Inch Soul', station: 'SomaFM · Soul Classics' },
            'https://ice1.somafm.com/insound-128-mp3': { track: 'The In-Sound', station: 'SomaFM · 60s Garage' },
            'https://ice1.somafm.com/covers-128-mp3': { track: 'Covers', station: 'SomaFM · Cover Versions' },
            'https://ice1.somafm.com/sf1033-128-mp3': { track: 'SF 10-33', station: 'SomaFM · Police Radio' },
            'https://ice1.somafm.com/scanner-128-mp3': { track: 'SF Police Scanner', station: 'SomaFM · Live Scanner' },
            'https://ice1.somafm.com/sfinsf-128-mp3': { track: 'SF in SF', station: 'SomaFM · Live in SF' },
            'https://ice1.somafm.com/vaporwaves-128-mp3': { track: 'Vaporvawes', station: 'SomaFM · Vaporwave' },
            'https://ice1.somafm.com/doomed-128-mp3': { track: 'Doomed', station: 'SomaFM · Doom Metal' },
            'https://ice1.somafm.com/beatblender-128-mp3': { track: 'Beat Blender', station: 'SomaFM · Deep House' },
        };

        function updateStationInfo(url) {
            const info = stationNames[url];
            if (info) {
                trackName.textContent = info.track;
                stationName.textContent = info.station;
            } else {
                trackName.textContent = 'Radio';
                stationName.textContent = 'Stream';
            }
        }

        function playRadio() {
            const url = stationSelect.value;
            if (audio.src !== url) {
                audio.src = url;
                audio.load();
            }
            audio.play().catch(e => console.warn('Play error:', e));
            vinylContainer.classList.add('playing');
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            updateStationInfo(url);
        }

        function pauseRadio() {
            audio.pause();
            vinylContainer.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }

        function stopRadio() {
            audio.pause();
            audio.currentTime = 0;
            audio.src = '';
            vinylContainer.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            trackName.textContent = 'No station selected';
            stationName.textContent = 'Press Play';
        }

        playBtn.addEventListener('click', () => {
            if (audio.src && !audio.paused) {
                pauseRadio();
            } else {
                playRadio();
            }
        });

        stopBtn.addEventListener('click', stopRadio);

        stationSelect.addEventListener('change', () => {
            if (audio.src && !audio.paused) {
                playRadio();
            } else {
                updateStationInfo(stationSelect.value);
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        updateStationInfo(stationSelect.value);

        // === ЗАМЕТКИ ===
        const notesList = document.getElementById('notesList');
        const noteInput = document.getElementById('noteInput');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const notesCounter = document.getElementById('notesCounter');

        let notes = [];

        function loadNotes() {
            try {
                const stored = localStorage.getItem('dashboard_notes');
                notes = stored ? JSON.parse(stored) : [];
            } catch (e) {
                notes = [];
            }
            renderNotes();
        }

        function saveNotes() {
            localStorage.setItem('dashboard_notes', JSON.stringify(notes));
            renderNotes();
        }

        function renderNotes() {
            if (notes.length === 0) {
                notesList.innerHTML = `
                    <div style="text-align:center; padding: 28px 0; color: var(--text-muted); font-size:0.85rem;">
                        <i class="far fa-sticky-note" style="font-size:1.6rem; display:block; margin-bottom:8px; opacity:0.3;"></i>
                        Здесь будут ваши мысли
                    </div>
                `;
            } else {
                let html = '';
                notes.forEach((note, index) => {
                    const text = note.length > 180 ? note.slice(0, 180) + '…' : note;
                    html += `
                        <div class="note-item">
                            <span class="note-text">${text}</span>
                            <button class="delete-note" data-index="${index}"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                });
                notesList.innerHTML = html;

                document.querySelectorAll('.delete-note').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const idx = parseInt(this.dataset.index, 10);
                        notes.splice(idx, 1);
                        saveNotes();
                    });
                });
            }
            notesCounter.textContent = `${notes.length} ${declension(notes.length, 'заметка', 'заметки', 'заметок')}`;
        }

        function declension(n, one, two, five) {
            if (n % 10 === 1 && n % 100 !== 11) return one;
            if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return two;
            return five;
        }

        function addNote() {
            const text = noteInput.value.trim();
            if (text === '') return;
            notes.unshift(text);
            noteInput.value = '';
            saveNotes();
            noteInput.focus();
        }

        noteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addNote();
            }
        });

        addNoteBtn.addEventListener('click', addNote);

        loadNotes();

        window.addEventListener('beforeunload', function() {
            saveNotes();
        });

    })();
</script>

</body>
</html>
