<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой уголок / Дашборд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* === ЦВЕТОВЫЕ СХЕМЫ (15 штук!) === */
        .theme-dark {
            --bg-primary: #0d0d0d;
            --bg-secondary: #121212;
            --bg-widget: #1c1c1c;
            --bg-widget-alt: #181818;
            --bg-input: #242424;
            --text-primary: #e5e5e5;
            --text-secondary: #a0a0a0;
            --text-muted: #6b6b6b;
            --border-color: rgba(255,255,255,0.04);
            --border-hover: rgba(255,255,255,0.08);
            --accent: #f97316;
            --accent-hover: #ff8c38;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a1a;
            --vinyl-light: #0d0d0d;
        }

        .theme-light {
            --bg-primary: #f0f0f0;
            --bg-secondary: #ffffff;
            --bg-widget: #f8f8f8;
            --bg-widget-alt: #f0f0f0;
            --bg-input: #e8e8e8;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border-color: rgba(0,0,0,0.06);
            --border-hover: rgba(0,0,0,0.12);
            --accent: #e8600c;
            --accent-hover: #f97316;
            --shadow: rgba(0,0,0,0.15);
            --vinyl-dark: #e0e0e0;
            --vinyl-light: #c0c0c0;
        }

        .theme-ocean {
            --bg-primary: #0a1628;
            --bg-secondary: #0f2040;
            --bg-widget: #152b4a;
            --bg-widget-alt: #122240;
            --bg-input: #1a3355;
            --text-primary: #d0e4ff;
            --text-secondary: #8ab4f8;
            --text-muted: #5a7a9a;
            --border-color: rgba(100,180,255,0.08);
            --border-hover: rgba(100,180,255,0.15);
            --accent: #4fc3ff;
            --accent-hover: #7ad0ff;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a2a4a;
            --vinyl-light: #0a1a3a;
        }

        .theme-forest {
            --bg-primary: #0a1a0a;
            --bg-secondary: #0f240f;
            --bg-widget: #163016;
            --bg-widget-alt: #122812;
            --bg-input: #1a3a1a;
            --text-primary: #d4e8d4;
            --text-secondary: #7ab87a;
            --text-muted: #4a7a4a;
            --border-color: rgba(100,200,100,0.08);
            --border-hover: rgba(100,200,100,0.15);
            --accent: #66d966;
            --accent-hover: #88e888;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a2a1a;
            --vinyl-light: #0a1a0a;
        }

        .theme-sunset {
            --bg-primary: #1a0a0a;
            --bg-secondary: #2a1010;
            --bg-widget: #3a1818;
            --bg-widget-alt: #301414;
            --bg-input: #4a2020;
            --text-primary: #f5d0c0;
            --text-secondary: #e89070;
            --text-muted: #9a6a5a;
            --border-color: rgba(255,150,100,0.08);
            --border-hover: rgba(255,150,100,0.15);
            --accent: #ff7f50;
            --accent-hover: #ff9a70;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #3a1a1a;
            --vinyl-light: #2a0a0a;
        }

        .theme-midnight {
            --bg-primary: #0a0a1a;
            --bg-secondary: #10102a;
            --bg-widget: #18183a;
            --bg-widget-alt: #141430;
            --bg-input: #20204a;
            --text-primary: #d0d0f0;
            --text-secondary: #9090d0;
            --text-muted: #5a5a8a;
            --border-color: rgba(150,100,255,0.08);
            --border-hover: rgba(150,100,255,0.15);
            --accent: #a78bfa;
            --accent-hover: #c4b5fd;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #1a1a3a;
            --vinyl-light: #0a0a2a;
        }

        .theme-cyber {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f1a;
            --bg-widget: #1a1a2e;
            --bg-widget-alt: #14142a;
            --bg-input: #22223a;
            --text-primary: #b0f0f0;
            --text-secondary: #70d0d0;
            --text-muted: #4a7a7a;
            --border-color: rgba(0,255,255,0.08);
            --border-hover: rgba(0,255,255,0.15);
            --accent: #00ffff;
            --accent-hover: #66ffff;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #1a1a2a;
            --vinyl-light: #0a0a1a;
        }

        .theme-rose {
            --bg-primary: #1a0a14;
            --bg-secondary: #2a0f1e;
            --bg-widget: #3a1528;
            --bg-widget-alt: #301222;
            --bg-input: #4a1a32;
            --text-primary: #f0d0e0;
            --text-secondary: #d080b0;
            --text-muted: #8a5a7a;
            --border-color: rgba(255,100,150,0.08);
            --border-hover: rgba(255,100,150,0.15);
            --accent: #f472b6;
            --accent-hover: #f9a8d4;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #3a1a28;
            --vinyl-light: #2a0a1e;
        }

        .theme-coffee {
            --bg-primary: #14100a;
            --bg-secondary: #1e1812;
            --bg-widget: #2a221a;
            --bg-widget-alt: #241e16;
            --bg-input: #362c22;
            --text-primary: #e8ddd0;
            --text-secondary: #b0a090;
            --text-muted: #7a6a5a;
            --border-color: rgba(200,170,130,0.08);
            --border-hover: rgba(200,170,130,0.15);
            --accent: #d4a373;
            --accent-hover: #e0b88a;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #2a221a;
            --vinyl-light: #1a120a;
        }

        .theme-aurora {
            --bg-primary: #0a0a14;
            --bg-secondary: #0a1420;
            --bg-widget: #0f2030;
            --bg-widget-alt: #0a1a2a;
            --bg-input: #142a3a;
            --text-primary: #d0f0e8;
            --text-secondary: #80d0c0;
            --text-muted: #4a8a7a;
            --border-color: rgba(50,200,180,0.08);
            --border-hover: rgba(50,200,180,0.15);
            --accent: #5eead4;
            --accent-hover: #8ff0e0;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #0a1a2a;
            --vinyl-light: #0a0a1a;
        }

        .theme-lavender {
            --bg-primary: #140a1a;
            --bg-secondary: #1e1028;
            --bg-widget: #2a1838;
            --bg-widget-alt: #241430;
            --bg-input: #36204a;
            --text-primary: #e8d8f0;
            --text-secondary: #b090d0;
            --text-muted: #7a5a8a;
            --border-color: rgba(180,100,255,0.08);
            --border-hover: rgba(180,100,255,0.15);
            --accent: #c084fc;
            --accent-hover: #d8a8fc;
            --shadow: rgba(0,0,0,0.7);
            --vinyl-dark: #2a1a3a;
            --vinyl-light: #1a0a2a;
        }

        .theme-matrix {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0a100a;
            --bg-widget: #0f1a0f;
            --bg-widget-alt: #0a160a;
            --bg-input: #142014;
            --text-primary: #b0e8b0;
            --text-secondary: #60b060;
            --text-muted: #3a6a3a;
            --border-color: rgba(0,200,0,0.08);
            --border-hover: rgba(0,200,0,0.15);
            --accent: #00cc00;
            --accent-hover: #33ff33;
            --shadow: rgba(0,0,0,0.8);
            --vinyl-dark: #0a1a0a;
            --vinyl-light: #0a0a0a;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .dashboard {
            max-width: 1440px;
            width: 100%;
            height: 100%;
            max-height: 900px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            grid-template-rows: auto 1fr 1fr;
            gap: 16px;
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 40px;
            box-shadow: 0 25px 60px var(--shadow);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .widget {
            background: var(--bg-widget);
            border-radius: 28px;
            padding: 20px 24px 20px 24px;
            backdrop-filter: blur(2px);
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.4s ease, border-color 0.2s;
        }

        .widget:hover {
            border-color: var(--border-hover);
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-shrink: 0;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .widget-header i {
            font-size: 1rem;
            color: var(--accent);
            width: 20px;
            transition: color 0.4s ease;
        }

        .widget-header .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 400;
            color: var(--text-muted);
            text-transform: none;
            font-size: 0.7rem;
        }

        .widget-header .header-right .refresh-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .widget-header .header-right .refresh-btn:hover {
            color: var(--accent);
            background: rgba(255,255,255,0.05);
            transform: rotate(60deg);
        }

        /* === RSS === */
        .rss-widget {
            grid-row: 1 / 4;
            background: var(--bg-widget-alt);
            border-right: 1px solid var(--border-color);
        }

        .rss-feed {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .rss-feed::-webkit-scrollbar {
            width: 4px;
        }
        .rss-feed::-webkit-scrollbar-track {
            background: transparent;
        }
        .rss-feed::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
            opacity: 0.3;
        }

        .rss-item {
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid transparent;
            transition: all 0.15s ease;
            cursor: default;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .rss-item:hover {
            background: rgba(255,255,255,0.04);
            border-left-color: var(--accent);
        }

        .rss-item .title {
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text-primary);
            text-decoration: none;
        }

        .rss-item .title a {
            color: inherit;
            text-decoration: none;
        }

        .rss-item .title a:hover {
            color: var(--accent);
        }

        .rss-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .rss-meta .source {
            background: var(--bg-widget);
            padding: 2px 10px;
            border-radius: 40px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.55rem;
            text-transform: uppercase;
        }

        /* === ПЛЕЕР === */
        .player-widget {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            background: var(--bg-widget);
        }

        .player-content {
            display: flex;
            align-items: center;
            gap: 24px;
            flex: 1;
        }

        .vinyl-container {
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            position: relative;
        }

        .vinyl-container svg {
            width: 100%;
            height: 100%;
            animation: spin 6s linear infinite;
            animation-play-state: paused;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.6));
            border-radius: 50%;
        }

        .vinyl-container.playing svg {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .radio-info {
            flex: 1;
        }

        .radio-info .track {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .radio-info .station {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .player-controls button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 40px;
            transition: 0.2s;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-controls button:hover {
            background: var(--bg-input);
            color: var(--accent);
        }

        .player-controls .play-btn {
            background: var(--accent);
            color: var(--bg-primary);
            width: 48px;
            height: 48px;
            font-size: 1.2rem;
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.25);
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }

        .player-controls .play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .station-select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            max-width: 150px;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .station-select option {
            background: var(--bg-widget);
            color: var(--text-primary);
        }

        .theme-select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .theme-select option {
            background: var(--bg-widget);
            color: var(--text-primary);
        }

        /* === ЧАСЫ + КАЛЕНДАРЬ === */
        .clock-widget {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background: var(--bg-widget-alt);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .clock-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .clock-time {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            transition: color 0.4s ease;
            line-height: 1;
        }

        .clock-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.03em;
        }

        /* Календарь */
        .calendar-section {
            flex-shrink: 0;
            width: 160px;
            background: var(--bg-widget);
            border-radius: 20px;
            padding: 12px 16px 14px 16px;
            border: 1px solid var(--border-color);
            transition: background 0.4s ease;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .calendar-grid .day-name {
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 2px 0;
            letter-spacing: 0.04em;
        }

        .calendar-grid .day {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 3px 0;
            border-radius: 8px;
            transition: 0.15s;
            cursor: default;
        }

        .calendar-grid .day.weekend {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .calendar-grid .day.today {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
            box-shadow: 0 2px 12px rgba(249, 115, 22, 0.25);
        }

        .calendar-grid .day.empty {
            color: transparent;
        }

        /* === ЗАМЕТКИ === */
        .notes-widget {
            grid-column: 2 / 3;
            grid-row: 3 / 4;
            background: var(--bg-widget);
        }

        .notes-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
            min-height: 0;
        }

        .notes-list::-webkit-scrollbar {
            width: 3px;
        }
        .notes-list::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
            opacity: 0.3;
        }

        .note-item {
            background: var(--bg-input);
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            border: 1px solid transparent;
            transition: 0.15s;
        }

        .note-item:hover {
            border-color: var(--border-hover);
        }

        .note-item .note-text {
            word-break: break-word;
            flex: 1;
        }

        .note-item .delete-note {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
            opacity: 0;
            flex-shrink: 0;
        }

        .note-item:hover .delete-note {
            opacity: 1;
        }

        .note-item .delete-note:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .notes-input-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .notes-input-row input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            transition: 0.2s;
        }

        .notes-input-row input:focus {
            border-color: var(--accent);
            background: var(--bg-input);
        }

        .notes-input-row input::placeholder {
            color: var(--text-muted);
        }

        .notes-input-row button {
            background: var(--accent);
            border: none;
            border-radius: 40px;
            padding: 0 18px;
            font-weight: 600;
            color: var(--bg-primary);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .notes-input-row button:hover {
            background: var(--accent-hover);
            transform: scale(0.97);
        }

        .notes-counter {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
            letter-spacing: 0.03em;
        }

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr 1.5fr;
                gap: 14px;
                padding: 18px;
            }
            .clock-time { font-size: 3.5rem; }
            .calendar-section { width: 140px; padding: 10px 12px; }
        }

        @media (max-width: 820px) {
            .dashboard {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto auto;
                max-height: none;
                height: auto;
                padding: 14px;
                gap: 14px;
                border-radius: 28px;
            }
            .rss-widget {
                grid-row: auto;
                max-height: 350px;
            }
            .player-widget {
                grid-column: 1 / 2;
                grid-row: auto;
                min-height: 180px;
            }
            .clock-widget {
                grid-column: 1 / 2;
                grid-row: auto;
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            .notes-widget {
                grid-column: 1 / 2;
                grid-row: auto;
                min-height: 250px;
            }
            .clock-time { font-size: 3rem; }
            .calendar-section { width: 180px; }
            .vinyl-container { width: 75px; height: 75px; }
            .station-select { max-width: 130px; font-size: 0.65rem; }
        }

        @media (max-width: 500px) {
            body { padding: 10px; }
            .dashboard { padding: 10px; border-radius: 20px; gap: 10px; }
            .widget { padding: 14px 16px; }
            .player-content { flex-wrap: wrap; gap: 12px; }
            .station-select { max-width: 110px; font-size: 0.6rem; }
            .clock-time { font-size: 2.4rem; }
            .clock-date { font-size: 0.75rem; }
            .calendar-section { width: 150px; padding: 8px 10px; }
            .calendar-grid .day { font-size: 0.65rem; }
            .rss-widget { max-height: 280px; }
        }
    </style>
</head>
<body>

<div class="dashboard">

    <!-- === RSS === -->
    <div class="widget rss-widget">
        <div class="widget-header">
            <i class="fas fa-rss"></i>
            <span>Новостная лента</span>
            <div class="header-right">
                <span><i class="fas fa-circle" style="color: #22c55e; font-size: 0.4rem; vertical-align: middle;"></i> обновлено</span>
                <button class="refresh-btn" id="refreshRssBtn" title="Обновить ленту">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
        <div class="rss-feed" id="rssFeed">
            <div style="text-align:center; padding: 40px 0; color: var(--text-muted); font-size: 0.9rem;">
                <i class="fas fa-spinner fa-pulse" style="font-size: 1.4rem; color: var(--accent);"></i><br><br>Загружаю ленту...
            </div>
        </div>
    </div>

    <!-- === ПЛЕЕР === -->
    <div class="widget player-widget">
        <div class="widget-header">
            <i class="fas fa-headphones"></i>
            <span>Радио / Плеер</span>
            <div class="header-right">
                <select class="station-select" id="stationSelect"></select>
                <select class="theme-select" id="themeSelect">
                    <option value="theme-dark">Тёмная</option>
                    <option value="theme-light">Светлая</option>
                    <option value="theme-ocean">Океан</option>
                    <option value="theme-forest">Лес</option>
                    <option value="theme-sunset">Закат</option>
                    <option value="theme-midnight">Полночь</option>
                    <option value="theme-cyber">Кибер</option>
                    <option value="theme-rose">Роза</option>
                    <option value="theme-coffee">Кофе</option>
                    <option value="theme-aurora">Аврора</option>
                    <option value="theme-lavender">Лаванда</option>
                    <option value="theme-matrix">Матрица</option>
                </select>
            </div>
        </div>

        <div class="player-content">
            <div class="vinyl-container" id="vinylContainer">
                <svg viewBox="0 0 120 120">
                    <defs>
                        <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="var(--vinyl-dark)"/>
                            <stop offset="25%" stop-color="var(--vinyl-light)"/>
                            <stop offset="50%" stop-color="var(--vinyl-dark)"/>
                            <stop offset="75%" stop-color="var(--vinyl-light)"/>
                            <stop offset="100%" stop-color="var(--vinyl-dark)"/>
                        </radialGradient>
                        <radialGradient id="shineGrad" cx="35%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
                            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                        </radialGradient>
                        <radialGradient id="labelGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="var(--accent)"/>
                            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.7"/>
                        </radialGradient>
                    </defs>
                    <!-- Тёмный диск -->
                    <circle cx="60" cy="60" r="54" fill="url(#vinylGrad)" stroke="var(--border-color)" stroke-width="0.5"/>
                    <!-- Блик -->
                    <circle cx="60" cy="60" r="54" fill="url(#shineGrad)"/>
                    <!-- Бороздки (концентрические круги) -->
                    <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.4"/>
                    <circle cx="60" cy="60" r="44" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.3"/>
                    <circle cx="60" cy="60" r="40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.4"/>
                    <circle cx="60" cy="60" r="36" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.3"/>
                    <circle cx="60" cy="60" r="32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.4"/>
                    <circle cx="60" cy="60" r="28" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.3"/>
                    <circle cx="60" cy="60" r="24" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.4"/>
                    <!-- Центральная этикетка -->
                    <circle cx="60" cy="60" r="18" fill="url(#labelGrad)" opacity="0.9"/>
                    <circle cx="60" cy="60" r="14" fill="var(--bg-secondary)" opacity="0.15"/>
                    <circle cx="60" cy="60" r="8" fill="var(--bg-secondary)" stroke="var(--border-color)" stroke-width="0.5"/>
                    <circle cx="60" cy="60" r="4" fill="var(--bg-primary)"/>
                    <circle cx="60" cy="60" r="2" fill="var(--accent)" opacity="0.3"/>
                    <!-- Текст на этикетке -->
                    <text x="60" y="53" font-size="5" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-weight="700" letter-spacing="0.5">S</text>
                    <text x="60" y="63" font-size="3.5" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-weight="300">FM</text>
                </svg>
            </div>
            <div class="radio-info">
                <div class="track" id="trackName">Groove Salad</div>
                <div class="station" id="stationName">SomaFM · Chillout</div>
                <div class="player-controls">
                    <button id="prevBtn" title="Предыдущая">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button id="playBtn" class="play-btn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="nextBtn" title="Следующая">
                        <i class="fas fa-step-forward"></i>
                    </button>
                    <button id="stopBtn" title="Стоп">
                        <i class="fas fa-stop"></i>
                    </button>
                    <div style="display: flex; align-items: center; gap: 6px; margin-left: 2px;">
                        <i class="fas fa-volume-low" style="color: var(--text-muted); font-size: 0.7rem;"></i>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7" 
                               style="width: 60px; background: var(--bg-input); height: 3px; border-radius: 10px; accent-color: var(--accent);">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- === ЧАСЫ + КАЛЕНДАРЬ === -->
    <div class="widget clock-widget">
        <div class="clock-section">
            <div class="clock-time" id="clockTime">00:00:00</div>
            <div class="clock-date" id="clockDate">1 января 2026</div>
        </div>
        <div class="calendar-section" id="calendarWidget">
            <div class="calendar-header">
                <span id="calendarMonth">Январь</span>
                <span id="calendarYear">2026</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <!-- === ЗАМЕТКИ === -->
    <div class="widget notes-widget">
        <div class="widget-header">
            <i class="fas fa-pencil-alt"></i>
            <span>Быстрые заметки</span>
            <div class="header-right">
                <span><i class="far fa-save"></i> автосохранение</span>
            </div>
        </div>
        <div class="notes-area">
            <div class="notes-list" id="notesList"></div>
            <div class="notes-input-row">
                <input type="text" id="noteInput" placeholder="Напишите мысль и нажмите Enter..." maxlength="200">
                <button id="addNoteBtn"><i class="fas fa-plus"></i> Добавить</button>
            </div>
            <div class="notes-counter" id="notesCounter">0 заметок</div>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // === СПИСОК РАДИОСТАНЦИЙ ===
        const stations = [
            { value: 'https://ice1.somafm.com/groovesalad-128-mp3', track: 'Groove Salad', station: 'SomaFM · Chillout' },
            { value: 'https://ice1.somafm.com/darkzone-128-mp3', track: 'The Dark Zone', station: 'SomaFM · Ambient' },
            { value: 'https://ice1.somafm.com/defcon-128-mp3', track: 'Def Con Radio', station: 'SomaFM · Dark Ambient' },
            { value: 'https://ice1.somafm.com/metal-128-mp3', track: 'Metal Detector', station: 'SomaFM · Heavy Metal' },
            { value: 'https://ice1.somafm.com/lc70s-128-mp3', track: 'Left Coast 70s', station: 'SomaFM · 70s Hits' },
            { value: 'https://ice1.somafm.com/u80s-128-mp3', track: 'Underground 80s', station: 'SomaFM · 80s Underground' },
            { value: 'https://ice1.somafm.com/7soul-128-mp3', track: 'Seven Inch Soul', station: 'SomaFM · Soul Classics' },
            { value: 'https://ice1.somafm.com/insound-128-mp3', track: 'The In-Sound', station: 'SomaFM · 60s Garage' },
            { value: 'https://ice1.somafm.com/covers-128-mp3', track: 'Covers', station: 'SomaFM · Cover Versions' },
            { value: 'https://ice1.somafm.com/sf1033-128-mp3', track: 'SF 10-33', station: 'SomaFM · Police Radio' },
            { value: 'https://ice1.somafm.com/scanner-128-mp3', track: 'SF Police Scanner', station: 'SomaFM · Live Scanner' },
            { value: 'https://ice1.somafm.com/sfinsf-128-mp3', track: 'SF in SF', station: 'SomaFM · Live in SF' },
            { value: 'https://ice1.somafm.com/vaporwaves-128-mp3', track: 'Vaporvawes', station: 'SomaFM · Vaporwave' },
            { value: 'https://ice1.somafm.com/doomed-128-mp3', track: 'Doomed', station: 'SomaFM · Doom Metal' },
            { value: 'https://ice1.somafm.com/beatblender-128-mp3', track: 'Beat Blender', station: 'SomaFM · Deep House' },
        ];

        let currentStationIndex = 0;

        // Заполняем select
        const stationSelect = document.getElementById('stationSelect');
        stations.forEach((s, i) => {
            const opt = document.createElement('option');
            opt.value = s.value;
            opt.textContent = s.track;
            if (i === 0) opt.selected = true;
            stationSelect.appendChild(opt);
        });

        // === ПЕРЕКЛЮЧАТЕЛЬ ТЕМ (выпадающий список) ===
        const themeSelect = document.getElementById('themeSelect');
        const body = document.body;

        function setTheme(themeName) {
            body.className = themeName;
            themeSelect.value = themeName;
            localStorage.setItem('dashboard_theme', themeName);
        }

        themeSelect.addEventListener('change', () => {
            setTheme(themeSelect.value);
        });

        const savedTheme = localStorage.getItem('dashboard_theme');
        if (savedTheme && document.querySelector(`option[value="${savedTheme}"]`)) {
            setTheme(savedTheme);
        } else {
            setTheme('theme-dark');
        }

        // === ЧАСЫ ===
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockTime').textContent = `${hours}:${minutes}:${seconds}`;
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('clockDate').textContent = now.toLocaleDateString('ru-RU', options);
        }
        updateClock();
        setInterval(updateClock, 1000);

        // === КАЛЕНДАРЬ ===
        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const today = now.getDate();

            document.getElementById('calendarMonth').textContent = now.toLocaleDateString('ru-RU', { month: 'long' });
            document.getElementById('calendarYear').textContent = year;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            let html = '';
            const dayNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            dayNames.forEach(name => {
                html += `<div class="day-name">${name}</div>`;
            });

            // Пустые ячейки до первого дня (пн=1, вс=7)
            let startOffset = firstDay === 0 ? 6 : firstDay - 1;

            // Дни предыдущего месяца
            for (let i = startOffset - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="day empty">${day}</div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const isWeekend = (new Date(year, month, d).getDay() === 0 || new Date(year, month, d).getDay() === 6);
                const isToday = d === today ? 'today' : '';
                const weekendClass = isWeekend ? 'weekend' : '';
                html += `<div class="day ${isToday} ${weekendClass}">${d}</div>`;
            }

            // Дни следующего месяца (чтобы заполнить сетку)
            const totalCells = startOffset + daysInMonth;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let d = 1; d <= remaining; d++) {
                html += `<div class="day empty">${d}</div>`;
            }

            document.getElementById('calendarGrid').innerHTML = html;
        }
        renderCalendar();

        // === RSS ===
        const RSS_FEEDS = [
            { name: 'Meduza', url: 'https://meduza.io/rss/all' },
            { name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
            { name: 'BBC Russian', url: 'http://feeds.bbci.co.uk/russian/news/rss.xml' },
        ];

        const rssFeedContainer = document.getElementById('rssFeed');

        async function fetchRSS() {
            try {
                let allItems = [];

                for (const feed of RSS_FEEDS) {
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(feed.url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) continue;
                    const xmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                    const items = xmlDoc.querySelectorAll('item');
                    
                    items.forEach(item => {
                        const title = item.querySelector('title')?.textContent?.trim() || 'Без заголовка';
                        const link = item.querySelector('link')?.textContent?.trim() || '#';
                        const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
                        allItems.push({
                            title: title,
                            link: link,
                            source: feed.name,
                            date: pubDate,
                        });
                    });
                }

                allItems.sort((a, b) => {
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    if (isNaN(dateA) || isNaN(dateB)) return 0;
                    return dateB - dateA;
                });

                allItems = allItems.slice(0, 30);

                if (allItems.length === 0) {
                    rssFeedContainer.innerHTML = `
                        <div style="padding: 30px 0; text-align:center; color: var(--text-muted); font-size:0.9rem;">
                            <i class="fas fa-newspaper" style="color: var(--accent);"></i><br><br>
                            Новостей пока нет<br>
                            <span style="font-size:0.8rem; opacity:0.6;">попробуйте обновить</span>
                        </div>
                    `;
                    return;
                }

                let html = '';
                allItems.forEach(item => {
                    const title = item.title.length > 120 ? item.title.slice(0, 120) + '…' : item.title;
                    const dateStr = item.date ? new Date(item.date).toLocaleDateString('ru-RU', {day:'numeric', month:'short'}) : '';
                    html += `
                        <div class="rss-item">
                            <div class="title"><a href="${item.link}" target="_blank" rel="noopener">${title}</a></div>
                            <div class="rss-meta">
                                <span class="source">${item.source}</span>
                                ${dateStr ? `<span class="date">${dateStr}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                rssFeedContainer.innerHTML = html;
            } catch (error) {
                console.warn('RSS load error:', error);
                rssFeedContainer.innerHTML = `
                    <div style="padding: 30px 0; text-align:center; color: var(--text-muted); font-size:0.9rem;">
                        <i class="fas fa-exclamation-triangle" style="color: var(--accent);"></i><br><br>
                        Не удалось загрузить ленту<br>
                        <span style="font-size:0.8rem; opacity:0.6;">проверьте интернет-соединение</span>
                    </div>
                `;
            }
        }

        fetchRSS();
        setInterval(fetchRSS, 600000);

        document.getElementById('refreshRssBtn').addEventListener('click', () => {
            const btn = document.getElementById('refreshRssBtn');
            btn.style.transform = 'rotate(360deg)';
            fetchRSS().finally(() => {
                setTimeout(() => { btn.style.transform = ''; }, 300);
            });
        });

        // === РАДИО ===
        const audio = new Audio();
        audio.volume = 0.7;

        const vinylContainer = document.getElementById('vinylContainer');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const trackName = document.getElementById('trackName');
        const stationName = document.getElementById('stationName');
        const volumeSlider = document.getElementById('volumeSlider');

        function updateStationInfo(index) {
            const s = stations[index];
            trackName.textContent = s.track;
            stationName.textContent = s.station;
            stationSelect.value = s.value;
        }

        function playRadio(index) {
            const url = stations[index].value;
            if (audio.src !== url) {
                audio.src = url;
                audio.load();
            }
            audio.play().catch(e => console.warn('Play error:', e));
            vinylContainer.classList.add('playing');
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            updateStationInfo(index);
            currentStationIndex = index;
        }

        function pauseRadio() {
            audio.pause();
            vinylContainer.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }

        function stopRadio() {
            audio.pause();
            audio.currentTime = 0;
            audio.src = '';
            vinylContainer.classList.remove('playing');
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            trackName.textContent = 'No station selected';
            stationName.textContent = 'Press Play';
        }

        playBtn.addEventListener('click', () => {
            if (audio.src && !audio.paused) {
                pauseRadio();
            } else {
                playRadio(currentStationIndex);
            }
        });

        stopBtn.addEventListener('click', stopRadio);

        prevBtn.addEventListener('click', () => {
            const newIndex = (currentStationIndex - 1 + stations.length) % stations.length;
            if (audio.src && !audio.paused) {
                playRadio(newIndex);
            } else {
                currentStationIndex = newIndex;
                updateStationInfo(newIndex);
            }
        });

        nextBtn.addEventListener('click', () => {
            const newIndex = (currentStationIndex + 1) % stations.length;
            if (audio.src && !audio.paused) {
                playRadio(newIndex);
            } else {
                currentStationIndex = newIndex;
                updateStationInfo(newIndex);
            }
        });

        stationSelect.addEventListener('change', () => {
            const idx = stations.findIndex(s => s.value === stationSelect.value);
            if (idx !== -1) {
                currentStationIndex = idx;
                if (audio.src && !audio.paused) {
                    playRadio(idx);
                } else {
                    updateStationInfo(idx);
                }
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        // Стартовая станция
        updateStationInfo(0);

        // === ЗАМЕТКИ ===
        const notesList = document.getElementById('notesList');
        const noteInput = document.getElementById('noteInput');
        const addNoteBtn = document.getElementById('addNoteBtn');
        const notesCounter = document.getElementById('notesCounter');

        let notes = [];

        function loadNotes() {
            try {
                const stored = localStorage.getItem('dashboard_notes');
                notes = stored ? JSON.parse(stored) : [];
            } catch (e) {
                notes = [];
            }
            renderNotes();
        }

        function saveNotes() {
            localStorage.setItem('dashboard_notes', JSON.stringify(notes));
            renderNotes();
        }

        function renderNotes() {
            if (notes.length === 0) {
                notesList.innerHTML = `
                    <div style="text-align:center; padding: 28px 0; color: var(--text-muted); font-size:0.85rem;">
                        <i class="far fa-sticky-note" style="font-size:1.6rem; display:block; margin-bottom:8px; opacity:0.3;"></i>
                        Здесь будут ваши мысли
                    </div>
                `;
            } else {
                let html = '';
                notes.forEach((note, index) => {
                    const text = note.length > 180 ? note.slice(0, 180) + '…' : note;
                    html += `
                        <div class="note-item">
                            <span class="note-text">${text}</span>
                            <button class="delete-note" data-index="${index}"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                });
                notesList.innerHTML = html;

                document.querySelectorAll('.delete-note').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const idx = parseInt(this.dataset.index, 10);
                        notes.splice(idx, 1);
                        saveNotes();
                    });
                });
            }
            notesCounter.textContent = `${notes.length} ${declension(notes.length, 'заметка', 'заметки', 'заметок')}`;
        }

        function declension(n, one, two, five) {
            if (n % 10 === 1 && n % 100 !== 11) return one;
            if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return two;
            return five;
        }

        function addNote() {
            const text = noteInput.value.trim();
            if (text === '') return;
            notes.unshift(text);
            noteInput.value = '';
            saveNotes();
            noteInput.focus();
        }

        noteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addNote();
            }
        });

        addNoteBtn.addEventListener('click', addNote);

        loadNotes();

        window.addEventListener('beforeunload', function() {
            saveNotes();
        });

    })();
</script>

</body>
</html>
